<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>浦添ER 振り返り共有シート</title>
<!-- Tailwind CDN: 本番用警告を抑制（プロトタイプ用途） -->
<script>
  // Tailwindの本番警告を無効化
  const originalWarn = console.warn;
  console.warn = function(...args) {
    if (args[0] && String(args[0]).includes('cdn.tailwindcss.com')) return;
    originalWarn.apply(console, args);
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-900: #0b1e3f;
    --navy-800: #12284d;
    --navy-700: #1b3a6b;
    --navy-600: #26518f;
    --blue-500: #2f6fb8;
    --blue-400: #4a8dd3;
    --accent: #3b82f6;
    --paper: #fafbfc;
    --line: #e3e8ef;
    --line-strong: #cfd6e0;
    --muted: #6b7a8f;
    --good: #059669;
    --mid: #d97706;
    --bad: #dc2626;
    --soft-warn: #fff7ed;
    --soft-info: #eef4fb;
    --soft-alert: #fef2f2;
  }
  /* Tailwind CDN ブロック時のフォールバック */
  .hidden { display: none !important; }
  html, body {
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    background: var(--paper);
    color: var(--navy-900);
    -webkit-tap-highlight-color: transparent;
  }
  .font-display { font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif; letter-spacing: 0.02em; }
  .num-tabular { font-variant-numeric: tabular-nums; }

  /* Section card */
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
  }

  /* Input base */
  .fld {
    width: 100%;
    box-sizing: border-box;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px; /* prevent iOS zoom */
    color: var(--navy-900);
    transition: border-color .15s, box-shadow .15s, background .15s;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
  }
  .fld:focus {
    outline: none;
    border-color: var(--blue-500);
    box-shadow: 0 0 0 3px rgba(47,111,184,0.15);
  }
  /* iOS Safari: type=date が大きく表示される問題を抑制 */
  input[type="date"].fld {
    min-height: 48px;
    line-height: 1.2;
    display: block;
  }
  input[type="date"].fld::-webkit-date-and-time-value {
    text-align: left;
    min-height: 1.2em;
  }
  input[type="number"].fld { -moz-appearance: textfield; }
  textarea.fld { min-height: 76px; resize: vertical; line-height: 1.55; }
  select.fld {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%231b3a6b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 40px;
  }

  /* Pill / segmented */
  .seg {
    display: grid;
    gap: 8px;
    width: 100%;
  }
  .seg-2 { grid-template-columns: 1fr 1fr; }
  .seg-3 { grid-template-columns: repeat(3, 1fr); }
  .seg-btn {
    border: 1.5px solid var(--line-strong);
    background: #fff;
    color: var(--navy-900);
    border-radius: 10px;
    padding: 13px 8px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    transition: all .12s ease;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    user-select: none;
    cursor: pointer;
  }
  .seg-btn:active { transform: scale(0.98); }
  .seg-btn[data-selected="true"] {
    background: var(--navy-800);
    color: #fff;
    border-color: var(--navy-800);
    box-shadow: 0 4px 14px -6px rgba(11,30,63,0.4);
  }
  .seg-btn[data-val="良い"][data-selected="true"] {
    background: var(--good); border-color: var(--good);
  }
  .seg-btn[data-val="普通"][data-selected="true"] {
    background: var(--mid); border-color: var(--mid);
  }
  .seg-btn[data-val="悪い"][data-selected="true"] {
    background: var(--bad); border-color: var(--bad);
  }
  .seg-btn[data-val="確保できなかった"][data-selected="true"] {
    background: var(--bad); border-color: var(--bad);
  }
  .seg-btn[data-val="確保できた"][data-selected="true"] {
    background: var(--good); border-color: var(--good);
  }

  /* Conditional blocks */
  .cond {
    display: none;
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    border: 1px dashed var(--line-strong);
    background: var(--soft-warn);
    animation: slideIn .2s ease;
  }
  .cond-alert {
    background: var(--soft-alert);
    border-color: #fecaca;
  }
  .cond[data-show="true"] { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Label */
  .lbl {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy-700);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
  }
  .lbl-required::after {
    content: "※";
    color: #dc2626;
    margin-left: 4px;
    font-weight: 700;
  }

  /* Section header */
  .sec-head {
    margin-bottom: 14px;
  }
  .sec-title {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--navy-900);
    line-height: 1.4;
  }
  .sec-title-required::after {
    content: "※";
    color: #dc2626;
    margin-left: 4px;
    font-weight: 700;
  }

  /* Tabs */
  .tab-btn {
    flex: 1;
    padding: 11px 8px;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all .15s;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 48px;
  }
  .tab-btn[data-active="true"] {
    color: var(--navy-800);
    border-bottom-color: var(--navy-800);
  }

  /* History card */
  .hist-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    transition: border-color .15s;
  }
  .hist-card:hover { border-color: var(--blue-400); }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-day { background: #fef3c7; color: #92400e; }
  .badge-night { background: #1e1b4b; color: #c7d2fe; }

  /* Primary button */
  .btn-primary {
    background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
    color: #fff;
    font-weight: 700;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    letter-spacing: 0.04em;
    box-shadow: 0 8px 20px -10px rgba(11,30,63,0.5);
    transition: transform .1s, box-shadow .15s, opacity .15s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; pointer-events: none; }
  .btn-secondary {
    background: #fff;
    border: 1.5px solid var(--line-strong);
    color: var(--navy-800);
    font-weight: 600;
    padding: 12px;
    border-radius: 10px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(11,30,63,0.55);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-backdrop[data-open="true"] { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Stat tile */
  .stat-tile {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; font-weight: 600; }
  .stat-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 22px; color: var(--navy-800); }
  .stat-unit { font-size: 12px; color: var(--muted); margin-left: 2px; font-weight: 500; }

  /* Score bar */
  .score-bar {
    height: 6px; border-radius: 3px; background: var(--line);
    overflow: hidden;
  }
  .score-bar > div { height: 100%; border-radius: 3px; transition: width .4s ease; }

  /* Icon */
  .ico { stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }

  /* Filter chips */
  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    color: var(--navy-700);
    cursor: pointer;
    transition: all .1s;
  }
  .chip[data-active="true"] {
    background: var(--navy-800);
    color: #fff;
    border-color: var(--navy-800);
  }
  /* 3-value filter chips (良い/普通/悪い) */
  .chip[data-active="true"][data-val="良い"] { background: var(--good); border-color: var(--good); }
  .chip[data-active="true"][data-val="普通"] { background: var(--mid); border-color: var(--mid); }
  .chip[data-active="true"][data-val="悪い"] { background: var(--bad); border-color: var(--bad); }
  .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-row { margin-bottom: 14px; }
  .filter-row:last-of-type { margin-bottom: 0; }

  /* Collapsible filter panel */
  .filter-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 2px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--navy-700);
  }
  .filter-toggle-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-toggle-chevron {
    transition: transform .2s ease;
    color: var(--muted);
  }
  .filter-panel[data-open="false"] .filter-toggle-chevron {
    transform: rotate(-90deg);
  }
  .filter-body {
    overflow: hidden;
    transition: max-height .25s ease, opacity .2s ease, margin-top .2s ease;
    max-height: 2000px;
    opacity: 1;
    margin-top: 14px;
  }
  .filter-panel[data-open="false"] .filter-body {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
  }
  .filter-count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--navy-800);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Subtle hero grid */
  .hero {
    background:
      radial-gradient(circle at 100% 0%, rgba(74,141,211,0.14), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(11,30,63,0.08), transparent 50%),
      linear-gradient(180deg, #fff, #f3f6fa);
    border-bottom: 1px solid var(--line);
  }
  .hero-mark {
    width: 36px; height: 36px;
    background: var(--navy-800);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }

  /* PIN dots */
  .pin-dot {
    width: 44px; height: 52px;
    border: 1.5px solid var(--line-strong);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    color: var(--navy-800);
    background: #fff;
  }
  .pin-dot[data-filled="true"] { border-color: var(--navy-800); background: var(--soft-info); }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--navy-800); color: #fff;
    padding: 12px 20px; border-radius: 16px;
    font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 60;
    max-width: calc(100vw - 40px);
    text-align: center;
    line-height: 1.5;
  }
  .toast[data-show="true"] { opacity: 1; transform: translateX(-50%) translateY(-4px); }


  /* Scroll tabs */
  .tabs-wrap {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  /* Notification bell */
  .bell-btn {
    position: relative;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--navy-700);
    cursor: pointer;
    flex-shrink: 0;
  }
  .bell-btn:active { background: var(--soft-info); border-radius: 8px; }
  .bell-badge {
    position: absolute;
    top: 6px;
    right: 4px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--bad);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    line-height: 1;
  }
  .bell-badge.hidden { display: none; }

  /* Share notification list modal */
  .share-modal {
    background: #fff;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalIn .2s ease;
  }
  .share-modal-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .share-modal-body {
    overflow-y: auto;
    padding: 14px;
    flex: 1;
    background: var(--paper);
  }
  .share-card {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: border-color .15s;
  }
  .share-card[data-unread="true"] {
    border-left-color: var(--blue-500);
    background: linear-gradient(90deg, var(--soft-info) 0%, #fff 30%);
  }
  .share-card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .share-card-body {
    font-size: 13px;
    line-height: 1.7;
    color: var(--navy-900);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .share-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Number stepper */
  .stepper { display: flex; align-items: stretch; border: 1.5px solid var(--line-strong); border-radius: 10px; overflow: hidden; background: #fff; width: 100%; min-height: 52px; box-sizing: border-box; }
  .stepper button { flex: 0 0 42px; font-size: 20px; font-weight: 700; color: var(--navy-700); background: #fafbfc; box-sizing: border-box; }
  .stepper button:active { background: var(--soft-info); }
  .stepper input { flex: 1; min-width: 0; width: 100%; text-align: center; font-size: 17px; font-weight: 700; border: none; outline: none; color: var(--navy-900); background: #fff; padding: 0 4px; box-sizing: border-box; -webkit-appearance: none; appearance: none; -moz-appearance: textfield; }
  .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body class="pb-24">

<!-- ============ HERO ============ -->
<header class="hero px-5 pt-6 pb-5">
  <div class="max-w-xl mx-auto">
    <div class="flex items-center gap-3 mb-2">
      <div class="hero-mark">
        <svg viewBox="0 0 24 24" width="20" height="20" class="ico"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M12 14v4"/><path d="M10 16h4"/></svg>
      </div>
      <div>
        <div class="text-[10px] font-bold tracking-[0.25em] text-[var(--blue-500)]">浦添ER</div>
        <h1 class="font-display font-bold text-[19px] leading-tight text-[var(--navy-900)]">振り返り共有シート</h1>
      </div>
    </div>
  </div>
</header>

<!-- ============ TABS ============ -->
<div class="tabs-wrap">
  <div class="max-w-xl mx-auto flex items-stretch">
    <button class="tab-btn" data-tab="input" data-active="true">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      入力
    </button>
    <button class="tab-btn" data-tab="history">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      履歴
    </button>
    <button class="tab-btn" data-tab="stats">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
      統計
    </button>
    <button class="bell-btn" id="bellBtn" aria-label="共有事項の通知">
      <svg viewBox="0 0 24 24" width="20" height="20" class="ico"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <span class="bell-badge hidden" id="bellBadge">0</span>
    </button>
  </div>
</div>

<main class="max-w-xl mx-auto px-4 pt-4 space-y-4">

  <!-- =========== TAB: INPUT =========== -->
  <section id="tab-input" class="space-y-4">

    <!-- 基本情報 -->
    <div class="card p-5">
      <div class="sec-head">
        <div class="sec-title">基本情報</div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="lbl lbl-required">日付</label>
          <input type="date" id="f_date" class="fld num-tabular" />
        </div>
        <div class="col-span-2">
          <label class="lbl lbl-required">勤務帯</label>
          <div class="seg seg-2" data-seg-field="shift">
            <button class="seg-btn" data-val="日勤">
              <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
              日勤
            </button>
            <button class="seg-btn" data-val="夜勤">
              <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
              夜勤
            </button>
          </div>
        </div>
        <div>
          <label class="lbl lbl-required">看護師（人）</label>
          <div class="stepper">
            <button type="button" data-stp="f_nurses" data-delta="-1">−</button>
            <input type="number" id="f_nurses" min="0" value="0" />
            <button type="button" data-stp="f_nurses" data-delta="1">+</button>
          </div>
        </div>
        <div>
          <label class="lbl lbl-required">医師（人）</label>
          <div class="stepper">
            <button type="button" data-stp="f_doctors" data-delta="-1">−</button>
            <input type="number" id="f_doctors" min="0" value="0" />
            <button type="button" data-stp="f_doctors" data-delta="1">+</button>
          </div>
        </div>
        <div class="col-span-2">
          <label class="lbl lbl-required">記録者名</label>
          <input type="text" id="f_reporter" class="fld" list="reporterList" autocomplete="off" />
          <datalist id="reporterList"></datalist>
        </div>
      </div>
    </div>

    <!-- 労働環境 -->
    <div class="card p-5">
      <div class="sec-head">
        <div class="sec-title">休憩や時間外</div>
      </div>

      <label class="lbl lbl-required">休憩の確保</label>
      <div class="seg seg-2" data-seg-field="break_secured">
        <button class="seg-btn" data-val="確保できた">

        <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background:#fef2f2;color:var(--bad)">
          <svg viewBox="0 0 24 24" width="18" height="18" class="ico"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </div>
        <div>
          <div class="font-display font-bold text-[16px] mb-1">この記録を削除しますか？</div>
          <p class="text-[12px] text-[var(--muted)] leading-relaxed">削除した記録は元に戻せません。</p>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-0 border-t border-[var(--line)]">
      <button class="p-4 text-[var(--muted)] font-semibold border-r border-[var(--line)]" onclick="closeModal('deleteModal')">キャンセル</button>
      <button class="p-4 font-bold" id="confirmDeleteBtn" style="color:var(--bad)">削除する</button>

</div>

<div class="modal-backdrop" id="shareModal">
  <div class="share-modal">
    <div class="share-modal-header">
      <div class="flex items-center gap-2">
        <svg viewBox="0 0 24 24" width="20" height="20" class="ico text-[var(--navy-700)]"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <div class="font-display font-bold text-[16px]">共有事項</div>
        <span class="text-[11px] text-[var(--muted)]" id="shareModalCount">0件</span>

      <button class="text-[var(--muted)] p-2 -m-2" onclick="closeModal('shareModal')" aria-label="閉じる">
        <svg viewBox="0 0 24 24" width="20" height="20" class="ico"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>

    <div class="share-modal-body" id="shareModalBody"></div>
  </div>
</div>

<div class="modal-backdrop" id="pinModal">
  <div class="modal">
    <div class="p-5">
      <div class="flex items-center gap-2 mb-4">
        <svg viewBox="0 0 24 24" width="18" height="18" class="ico text-[var(--navy-700)]"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

        <div class="pin-dot" data-i="3"></div>
      </div>
      <input type="tel" inputmode="numeric" maxlength="4" id="pinInput" class="fld text-center num-tabular tracking-[0.5em]" placeholder="----" autocomplete="off" />

      <button class="p-4 text-[var(--navy-800)] font-bold" id="pinConfirmBtn">ダウンロード</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   ER Team Reflection — App Logic
   Storage: LocalStorage key "er_reflection_v1"

   データ仕様メモ:
   - record.case.items[]   : 振り返りケース（新形式・複数件）
   - record.case.{type, case_id, content} : 旧形式（読み取り専用・新規保存はしない）
   - record.good_jobs[]    : good job（新形式）
   - record.success_cases[]: 旧形式（読み取り専用・新規保存はしない）
================================================================ */

const STORAGE_KEY = "er_reflection_v1";
const READ_KEY = "er_reflection_read_v1";
const PIN_CODE = "0000";

// ------------ State ------------
let formState = {
  shift: null,
  break_secured: null,
  help_requested: null,
  case_exists: null,
  team_collab: null, external_collab: null, psych_safety: null,
  hospitality: null, wait_care: null, anxiety_relief: null,
};
let editingId = null;
let deletingId = null;
let goodJobSeq = 0;
let caseSeq = 0;
let statsChartMode = "bar";
let shareReadTimer = null;
let isSaving = false;

// ------------ Helpers ------------
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const pad2 = n => String(n).padStart(2, "0");
const todayIso = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
};
const nowTime = () => {
  const d = new Date();
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
};
const loadAll = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
};
const saveAll = arr => localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));

const toast = (msg) => {
  const t = $("#toast");
  t.textContent = msg;
  t.dataset.show = "true";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.dataset.show = "false", 2200);
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function formatUpdatedAt(ms) {
  const d = new Date(ms);
  return `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function getCaseItems(rec) {
  const c = (rec && rec.case) || {};
  if (Array.isArray(c.items) && c.items.length > 0) return c.items;
  if (c.type || c.case_id || c.content) {
    return [{ type: c.type, case_id: c.case_id, content: c.content }];
  }
  return [];
}

function getGoodJobs(rec) {
  if (!rec) return [];
  if (Array.isArray(rec.good_jobs)) return rec.good_jobs;
  if (Array.isArray(rec.success_cases)) {
    return rec.success_cases.map(sc => ({ target: "", comment: sc.content || "" }));
  }
  return [];
}

function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

function init() {
  $("#f_date").value = todayIso();

  setupSegmented();
  setupSteppers();
  setupTabs();
  setupFilters();
  setupSaveFlow();
  setupExport();
  setupNotification();
  setupGoodJobs();
  setupCases();
  refreshReporterList();
  refreshNotificationBadge();

  renderHistory();
  renderStats();
}

function setupGoodJobs() {
  $("#addGoodJobBtn").addEventListener("click", () => addGoodJob());
}

function addGoodJob(initial) {
  const list = $("#goodJobs");
  const seq = ++goodJobSeq;
  const wrap = document.createElement("div");
  wrap.className = "rounded-lg p-3 border border-[var(--line)] bg-[#fafbfc]";
  wrap.dataset.goodJob = String(seq);
  const target = (initial && initial.target) || "";
  const comment = (initial && initial.comment) || "";
  wrap.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11px] font-bold text-[var(--navy-700)] num-tabular" data-goodjob-num>good job ${seq}</span>
      <button type="button" class="text-[var(--muted)] p-1 -m-1" data-goodjob-remove>
        <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <div class="space-y-2">
      <div>
        <label class="lbl">対象者</label>
        <input type="text" class="fld" data-goodjob-target list="reporterList" autocomplete="off" placeholder="名前を入力" value="${escapeHtml(target)}" />
      </div>
      <div>
        <label class="lbl">コメント</label>
        <textarea class="fld" data-goodjob-comment placeholder="良かった関わり・アセスメント・対応など">${escapeHtml(comment)}</textarea>
      </div>
    </div>
  `;
  wrap.querySelector("[data-goodjob-remove]").addEventListener("click", () => {
    wrap.remove();
    if ($$("#goodJobs [data-good-job]").length === 0) {
      goodJobSeq = 0;
    } else {
      renumberGoodJobs();
    }
  });
  list.appendChild(wrap);
  return wrap;
}

function renumberGoodJobs() {
  $$("#goodJobs [data-good-job]").forEach((el, i) => {
    const numEl = el.querySelector("[data-goodjob-num]");
    if (numEl) numEl.textContent = `good job ${i + 1}`;
  });
}

function clearGoodJobs() {
  $("#goodJobs").innerHTML = "";
  goodJobSeq = 0;
}

function readGoodJobs() {
  return $$("#goodJobs [data-good-job]").map(el => ({
    target: el.querySelector("[data-goodjob-target]").value.trim(),
    comment: el.querySelector("[data-goodjob-comment]").value.trim(),
  })).filter(g => g.target || g.comment);
}

function setupCases() {
  $("#addCaseBtn").addEventListener("click", () => addCase());
}

function addCase(initial) {
  const list = $("#caseItems");
  const seq = ++caseSeq;
  const wrap = document.createElement("div");
  wrap.className = "rounded-lg p-3 border border-[var(--line)] bg-[#fafbfc]";
  wrap.dataset.caseItem = String(seq);
  const type = (initial && initial.type) || "";
  const caseId = (initial && initial.case_id) || "";
  const content = (initial && initial.content) || "";
  wrap.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11px] font-bold text-[var(--navy-700)] num-tabular" data-case-num>症例 ${seq}</span>
      <button type="button" class="text-[var(--muted)] p-1 -m-1" data-case-remove>
        <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="lbl">搬送区分</label>
        <select class="fld" data-case-type>
          <option value="">選択してください</option>
          <option value="救急車" ${type === "救急車" ? "selected" : ""}>救急車</option>
          <option value="ウォークイン" ${type === "ウォークイン" ? "selected" : ""}>ウォークイン</option>
          <option value="その他" ${type === "その他" ? "selected" : ""}>その他</option>
        </select>
      </div>
      <div>
        <label class="lbl">ID</label>
        <input type="text" class="fld" data-case-id placeholder="例：12345678" value="${escapeHtml(caseId)}" />
      </div>
      <div>
        <label class="lbl">内容</label>
        <textarea class="fld" data-case-content placeholder="主訴・経過・学びなど">${escapeHtml(content)}</textarea>
      </div>
    </div>
  `;
  wrap.querySelector("[data-case-remove]").addEventListener("click", () => {
    wrap.remove();
    if ($$("#caseItems [data-case-item]").length === 0) {
      caseSeq = 0;
    } else {
      renumberCases();
    }
  });
  list.appendChild(wrap);
  return wrap;
}

function renumberCases() {
  $$("#caseItems [data-case-item]").forEach((el, i) => {
    const numEl = el.querySelector("[data-case-num]");
    if (numEl) numEl.textContent = `症例 ${i + 1}`;
  });
}

function clearCases() {
  $("#caseItems").innerHTML = "";
  caseSeq = 0;
}

function readCases() {
  return $$("#caseItems [data-case-item]").map(el => ({
    type: el.querySelector("[data-case-type]").value,
    case_id: el.querySelector("[data-case-id]").value.trim(),
    content: el.querySelector("[data-case-content]").value.trim(),
  })).filter(c => c.type || c.case_id || c.content);
}

function refreshReporterList() {
  const dl = $("#reporterList");
  if (!dl) return;
  const all = loadAll();
  const names = new Set();
  all.forEach(r => {
    const reporter = (r.reporter || "").trim();
    if (reporter) names.add(reporter);
    getGoodJobs(r).forEach(g => {
      const t = (g.target || "").trim();
      if (t) names.add(t);
    });
  });
  const sorted = [...names].sort((a,b) => a.localeCompare(b, "ja"));
  dl.innerHTML = sorted.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
}

const loadReadIds = () => {
  try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]")); }
  catch { return new Set(); }
};
const saveReadIds = (set) => localStorage.setItem(READ_KEY, JSON.stringify([...set]));

function getShareRecords() {
  return loadAll()
    .filter(r => r.share && r.share.trim())
    .sort((a,b) => b.saved_at_ms - a.saved_at_ms);
}

function refreshNotificationBadge() {
  const badge = $("#bellBadge");
  if (!badge) return;
  const readIds = loadReadIds();
  const shareRecords = getShareRecords();
  const unreadCount = shareRecords.filter(r => !readIds.has(r.id)).length;
  if (unreadCount > 0) {
    badge.textContent = unreadCount > 99 ? "99+" : unreadCount;
    badge.classList.remove("hidden");
  } else {
    badge.classList.add("hidden");
  }
}

function openShareModal() {
  const shareRecords = getShareRecords();
  const readIds = loadReadIds();
  const body = $("#shareModalBody");
  const countEl = $("#shareModalCount");

  countEl.textContent = `${shareRecords.length}件`;

  if (!shareRecords.length) {
    body.innerHTML = `<div class="share-empty">共有事項の記録はまだありません</div>`;
  } else {
    body.innerHTML = shareRecords.map(r => {
      const isUnread = !readIds.has(r.id);
      const shiftBadge = r.shift === "夜勤"
        ? `<span class="badge badge-night">🌙 夜勤</span>`
        : `<span class="badge badge-day">☀ 日勤</span>`;
      return `
        <div class="share-card" data-unread="${isUnread}">
          <div class="share-card-meta">
            ${shiftBadge}
            <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)]">${r.date}</span>
            ${isUnread ? `<span class="badge" style="background:#dbeafe;color:#1e40af;margin-left:auto">NEW</span>` : ""}
          </div>
          <div class="share-card-body">${escapeHtml(r.share)}</div>
        </div>
      `;
    }).join("");
  }

  openModal("shareModal");

  if (shareReadTimer) clearTimeout(shareReadTimer);
  shareReadTimer = setTimeout(() => {
    shareReadTimer = null;
    if ($("#shareModal").dataset.open !== "true") return;
    const newReadIds = loadReadIds();
    let changed = false;
    shareRecords.forEach(r => {
      if (!newReadIds.has(r.id)) {
        newReadIds.add(r.id);
        changed = true;
      }
    });
    if (changed) {
      saveReadIds(newReadIds);
      refreshNotificationBadge();
    }
  }, 600);
}

function setupNotification() {
  $("#bellBtn").addEventListener("click", openShareModal);
}

function selectSeg(field, val) {
  const group = $(`[data-seg-field="${field}"]`);
  if (!group) return;
  $$(".seg-btn", group).forEach(b => {
    b.dataset.selected = (b.dataset.val === val ? "true" : "false");
  });
  formState[field] = val;
  handleConditionals(field, val);
}

function setupSegmented() {
  $$("[data-seg-field]").forEach(group => {
    const field = group.dataset.segField;
    group.addEventListener("click", (e) => {
      const btn = e.target.closest(".seg-btn");
      if (!btn) return;
      selectSeg(field, btn.dataset.val);
    });
  });
}

function handleConditionals(field, val) {
  if (field === "break_secured") {
    const box = $("#break_detail");
    box.dataset.show = (val === "確保できなかった") ? "true" : "false";
    if (val !== "確保できなかった") {
      formState.help_requested = null;
      $$('[data-seg-field="help_requested"] .seg-btn').forEach(b => b.dataset.selected = "false");
      $("#help_no_reason").dataset.show = "false";
      $("#f_short_min").value = 0;
      $("#f_short_people").value = 1;
      $("#f_no_help_reason").value = "";
    }
  }
  if (field === "help_requested") {
    $("#help_no_reason").dataset.show = (val === "なし") ? "true" : "false";
    if (val !== "なし") $("#f_no_help_reason").value = "";
  }
  if (field === "case_exists") {
    $("#case_detail").dataset.show = (val === "あり") ? "true" : "false";
    if (val === "あり") {
      if ($$("#caseItems [data-case-item]").length === 0) {
        addCase();
      }
    } else {
      clearCases();
    }
  }
}

function setupSteppers() {
  $$("[data-stp]").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = $("#" + btn.dataset.stp);
      const delta = parseInt(btn.dataset.delta, 10);
      const current = parseInt(input.value || "0", 10);
      const dataMin = btn.dataset.min !== undefined ? parseInt(btn.dataset.min, 10) : null;
      const inputMin = input.min !== "" ? parseInt(input.min, 10) : null;
      const lower = dataMin !== null ? dataMin : (inputMin !== null ? inputMin : 0);
      const next = Math.max(lower, current + delta);
      input.value = next;
    });
  });
}

function setupTabs() {
  $$(".tab-btn").forEach(b => {
    b.addEventListener("click", () => {
      const target = b.dataset.tab;
      $$(".tab-btn").forEach(x => x.dataset.active = (x === b ? "true" : "false"));
      $("#tab-input").classList.toggle("hidden", target !== "input");
      $("#tab-history").classList.toggle("hidden", target !== "history");
      $("#tab-stats").classList.toggle("hidden", target !== "stats");
      if (target === "history") renderHistory();
      if (target === "stats") renderStats();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function setupFilters() {
  $$('[data-filter-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const kind = btn.dataset.filterToggle;
      const panel = $(`#${kind}FilterPanel`);
      panel.dataset.open = panel.dataset.open === "true" ? "false" : "true";
    });
  });

  const rankingToggle = $('[data-ranking-toggle]');
  if (rankingToggle) {
    rankingToggle.addEventListener('click', () => {
      const panel = $('#rankingPanel');
      panel.dataset.open = panel.dataset.open === "true" ? "false" : "true";
    });
  }

  $$(".chip-group").forEach(group => {
    group.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      const mode = group.dataset.mode || "multi";
      if (mode === "single") {
        $$(".chip", group).forEach(c => c.dataset.active = (c === btn ? "true" : "false"));
      } else {
        btn.dataset.active = btn.dataset.active === "true" ? "false" : "true";
      }
      const kind = group.dataset.filterKind;
      if (kind === "hist") { updateFilterCountBadge("hist"); renderHistory(); }
      if (kind === "stats") { updateFilterCountBadge("stats"); renderStats(); }
    });
  });

  $("#histFreeSearch").addEventListener("input", debounce(() => { updateFilterCountBadge("hist"); renderHistory(); }, 180));
  $("#statsFreeSearch").addEventListener("input", debounce(() => { updateFilterCountBadge("stats"); renderStats(); }, 180));

  $("#histClearBtn").addEventListener("click", () => {
    clearChipGroups("hist");
    $("#histFreeSearch").value = "";
    updateFilterCountBadge("hist");
    renderHistory();
  });
  $("#statsClearBtn").addEventListener("click", () => {
    clearChipGroups("stats");
    $("#statsFreeSearch").value = "";
    updateFilterCountBadge("stats");
    renderStats();
  });

  updateFilterCountBadge("hist");
  updateFilterCountBadge("stats");
}

function updateFilterCountBadge(kind) {
  const badge = $(`#${kind}FilterCount`);
  if (!badge) return;
  let count = 0;
  $$(`.chip-group[data-filter-kind="${kind}"]`).forEach(group => {
    const key = group.dataset.filterKey;
    if (key === "days") return;
    const selected = $$('.chip[data-active="true"]', group);
    if (selected.length > 0) count++;
  });
  const search = kind === "hist" ? $("#histFreeSearch").value.trim() : $("#statsFreeSearch").value.trim();
  if (search) count++;
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove("hidden");
  } else {
    badge.classList.add("hidden");
  }
}

function clearChipGroups(kind) {
  $$(`.chip-group[data-filter-kind="${kind}"]`).forEach(group => {
    const mode = group.dataset.mode;
    const key = group.dataset.filterKey;
    $$(".chip", group).forEach(c => {
      if (mode === "single" && key === "days") {
        c.dataset.active = (c.dataset.days === "7" ? "true" : "false");
      } else {
        c.dataset.active = "false";
      }
    });
  });
}

function getSelectedChipValues(kind, key) {
  const group = $(`.chip-group[data-filter-kind="${kind}"][data-filter-key="${key}"]`);
  if (!group) return [];
  return $$('.chip[data-active="true"]', group).map(c => c.dataset.val).filter(Boolean);
}

function setupSaveFlow() {
  $("#saveBtn").addEventListener("click", () => {
    const missing = [];
    if (!$("#f_date").value) missing.push("日付");
    if (!formState.shift) missing.push("勤務帯");
    if (!$("#f_reporter").value.trim()) missing.push("記録者名");
    if (!formState.break_secured) missing.push("休憩の確保");
    if (!formState.team_collab) missing.push("チーム連携");
    if (!formState.external_collab) missing.push("他関連機関との連携");
    if (!formState.psych_safety) missing.push("心理的安全性");
    if (!formState.hospitality) missing.push("接遇面");
    if (!formState.wait_care) missing.push("待ち時間への配慮");
    if (!formState.anxiety_relief) missing.push("不安軽減");
    if (!formState.case_exists) missing.push("振り返りケース");
    if (missing.length) {
      toast(`未入力: ${missing.join(" / ")}`);
      return;
    }
    openModal("confirmModal");
  });

  $("#confirmSaveBtn").addEventListener("click", () => {
    if (isSaving) return;
    isSaving = true;
    const confirmBtn = $("#confirmSaveBtn");
    confirmBtn.style.opacity = "0.6";
    confirmBtn.style.pointerEvents = "none";

    try {
      const all = loadAll();
      if (editingId) {
        const idx = all.findIndex(r => r.id === editingId);
        const record = buildRecord();
        if (idx >= 0) {
          record.id = all[idx].id;
          record.created_at_ms = all[idx].created_at_ms || all[idx].saved_at_ms;
          record.updated_at_ms = Date.now();
          all[idx] = record;
        } else {
          all.push(record);
        }
      } else {
        const record = buildRecord();
        record.created_at_ms = record.saved_at_ms;
        all.push(record);
      }
      saveAll(all);
      refreshReporterList();
      refreshNotificationBadge();
      closeModal("confirmModal");
      openModal("postSaveModal");
    } finally {
      setTimeout(() => {
        isSaving = false;
        confirmBtn.style.opacity = "";
        confirmBtn.style.pointerEvents = "";
      }, 200);
    }
  });

  $("#postCloseBtn").addEventListener("click", () => {
    closeModal("postSaveModal");
    refreshNotificationBadge();
  });
  $("#postNewBtn").addEventListener("click", () => {
    closeModal("postSaveModal");
    resetForm();
    refreshNotificationBadge();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  $("#cancelEditBtn").addEventListener("click", cancelEdit);

  $("#confirmDeleteBtn").addEventListener("click", () => {
    if (deletingId) {
      deleteRecord(deletingId);
      deletingId = null;
    }
    closeModal("deleteModal");
  });
}

function askDeleteRecord(id) {

}

function buildRecord() {
  const readNote = name => {
    const el = $(`[data-note="${name}"]`);
    return el ? el.value.trim() : "";
  };
  return {
    id: "r_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    date: $("#f_date").value,
    saved_time: nowTime(),
    saved_at_ms: Date.now(),
    shift: formState.shift,
    team: {
      nurses: parseInt($("#f_nurses").value || "0", 10),
      doctors: parseInt($("#f_doctors").value || "0", 10),
    },
    reporter: $("#f_reporter").value.trim(),
    workload: {
      break_secured: formState.break_secured,
      short_min: formState.break_secured === "確保できなかった" ? parseInt($("#f_short_min").value || "0", 10) : 0,
      short_people: formState.break_secured === "確保できなかった" ? parseInt($("#f_short_people").value || "0", 10) : 0,
      help_requested: formState.break_secured === "確保できなかった" ? formState.help_requested : null,
      no_help_reason: (formState.break_secured === "確保できなかった" && formState.help_requested === "なし") ? $("#f_no_help_reason").value.trim() : "",
    },
    team_state: {
      team_collab: formState.team_collab,
      team_collab_note: readNote("team_collab_note"),
      external_collab: formState.external_collab,
      external_collab_note: readNote("external_collab_note"),
      psych_safety: formState.psych_safety,
      psych_safety_note: readNote("psych_safety_note"),
    },
    patient_care: {
      hospitality: formState.hospitality,
      wait_care: formState.wait_care,
      anxiety_relief: formState.anxiety_relief,
      comment: $("#f_patient_comment").value.trim(),
    },
    case: {
      exists: formState.case_exists,
      items: formState.case_exists === "あり" ? readCases() : [],
    },
    good_jobs: readGoodJobs(),
    share: $("#f_share").value.trim(),
  };
}

  formState = {

    team_collab: null, external_collab: null, psych_safety: null,
    hospitality: null, wait_care: null, anxiety_relief: null,
  };
  $("#f_date").value = todayIso();
  $("#f_nurses").value = 0;
  $("#f_doctors").value = 0;
  $("#f_reporter").value = "";
  $("#f_short_min").value = 0;
  $("#f_short_people").value = 1;

  $("#f_share").value = "";

function updateSaveButtonLabel() {

    : `<svg viewBox="0 0 24 24" width="18" height="18" class="ico"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>振り返りを保存`;

function loadRecordToForm(rec) {
  resetForm();
  editingId = rec.id;

  $("#f_date").value = rec.date || todayIso();
  $("#f_nurses").value = (rec.team && rec.team.nurses) || 0;
  $("#f_doctors").value = (rec.team && rec.team.doctors) || 0;
  $("#f_reporter").value = rec.reporter || "";

  if (rec.shift) selectSeg("shift", rec.shift);

  if (rec.workload && rec.workload.break_secured) {
    selectSeg("break_secured", rec.workload.break_secured);
    if (rec.workload.break_secured === "確保できなかった") {
      $("#f_short_min").value = rec.workload.short_min || 0;
      $("#f_short_people").value = rec.workload.short_people || 1;
      if (rec.workload.help_requested) {
        selectSeg("help_requested", rec.workload.help_requested);
        if (rec.workload.help_requested === "なし") {
          $("#f_no_help_reason").value = rec.workload.no_help_reason || "";
        }
      }
    }
  }

  const t = rec.team_state || {};
  if (t.team_collab) selectSeg("team_collab", t.team_collab);
  if (t.external_collab) selectSeg("external_collab", t.external_collab);
  if (t.psych_safety) selectSeg("psych_safety", t.psych_safety);
  $$('[data-note]').forEach(el => {
    const key = el.dataset.note;
    if (t[key] !== undefined) el.value = t[key] || "";
  });

  const p = rec.patient_care || {};
  if (p.hospitality) selectSeg("hospitality", p.hospitality);
  if (p.wait_care) selectSeg("wait_care", p.wait_care);
  if (p.anxiety_relief) selectSeg("anxiety_relief", p.anxiety_relief);
  $("#f_patient_comment").value = p.comment || "";

  const c = rec.case || {};
  if (c.exists) {
    selectSeg("case_exists", c.exists);
    if (c.exists === "あり") {
      clearCases();
      const items = getCaseItems(rec);
      if (items.length > 0) {
        items.forEach(item => addCase(item));
      } else {
        addCase();
      }
    }
  }

  const goodJobsList = getGoodJobs(rec);
  goodJobsList.forEach(g => addGoodJob(g));

  $("#f_share").value = rec.share || "";

  updateSaveButtonLabel();
}

function startEditRecord(id) {
  const rec = loadAll().find(r => r.id === id);
  if (!rec) {
    toast("記録が見つかりません");
    return;
  }
  loadRecordToForm(rec);
  $$(".tab-btn").forEach(b => b.dataset.active = (b.dataset.tab === "input" ? "true" : "false"));
  $("#tab-input").classList.remove("hidden");
  $("#tab-history").classList.add("hidden");
  $("#tab-stats").classList.add("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEdit() {
  resetForm();
  toast("編集をキャンセルしました");
}

function deleteRecord(id) {
  const all = loadAll();
  const idx = all.findIndex(r => r.id === id);
  if (idx < 0) return;
  all.splice(idx, 1);
  saveAll(all);
  const read = loadReadIds();
  read.delete(id);
  saveReadIds(read);
  if (editingId === id) resetForm();
  refreshNotificationBadge();
  refreshReporterList();
  renderHistory();
  renderStats();
  toast("削除しました");
}

function getActiveDays(filterSel) {
  const a = $(`${filterSel} .chip[data-active="true"]`);
  return a ? parseInt(a.dataset.days, 10) : 7;
}
function filterByDays(records, days) {
  if (!days || days <= 0) return [...records].sort((a,b) => b.saved_at_ms - a.saved_at_ms);
  const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
  return records.filter(r => r.saved_at_ms >= cutoff)
    .sort((a,b) => b.saved_at_ms - a.saved_at_ms);
}

function applyFilters(records, f) {
  const has = arr => Array.isArray(arr) && arr.length > 0;
  return records.filter(r => {
    if (has(f.shift) && !f.shift.includes(r.shift)) return false;
    if (has(f.break_secured) && !f.break_secured.includes(r.workload.break_secured)) return false;
    if (has(f.team_state)) {
      const vals = [r.team_state.team_collab, r.team_state.external_collab, r.team_state.psych_safety];
      if (!f.team_state.some(v => vals.includes(v))) return false;
    }
    if (has(f.patient_care)) {
      const vals = [r.patient_care.hospitality, r.patient_care.wait_care, r.patient_care.anxiety_relief];
      if (!f.patient_care.some(v => vals.includes(v))) return false;
    }
    if (has(f.case_exists) && !f.case_exists.includes(r.case.exists)) return false;
    if (has(f.share)) {
      const label = (r.share && r.share.trim()) ? "あり" : "なし";
      if (!f.share.includes(label)) return false;
    }
    if (has(f.success_exists)) {
      const label = getGoodJobs(r).length > 0 ? "あり" : "なし";
      if (!f.success_exists.includes(label)) return false;
    }
    if (f.q) {
      const q = f.q.toLowerCase();
      const goodJobsText = getGoodJobs(r)
        .map(g => `${g.target || ""} ${g.comment || ""}`)
        .join(" ");
      const caseItems = getCaseItems(r);
      const caseText = caseItems
        .map(it => [it.type, it.case_id, it.content].filter(Boolean).join(" "))
        .join(" ");
      const text = [
        r.reporter, r.share,
        r.team_state.team_collab_note, r.team_state.external_collab_note, r.team_state.psych_safety_note,
        r.patient_care.comment,
        caseText,
        r.workload.no_help_reason,
        goodJobsText,
      ].filter(Boolean).join(" ").toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });
}

function readFilters(kind) {

}
function ratingDot(r) {

function renderRanking(allRecords) {
  const panel = $("#rankingPanel");
  const body = $("#rankingBody");
  const countBadge = $("#rankingCount");
  if (!panel || !body) return;

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0).getTime();
  const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 1, 0, 0, 0, 0).getTime();

  const monthRecords = allRecords.filter(r => {
    const ts = r.saved_at_ms || 0;
    return ts >= monthStart && ts < monthEnd;
  });

  const tally = new Map();
  monthRecords.forEach(r => {
    getGoodJobs(r).forEach(g => {
      const target = (g.target || "").trim();
      if (!target) return;
      if (!tally.has(target)) tally.set(target, { count: 0, comments: [] });
      const entry = tally.get(target);
      entry.count += 1;
      entry.comments.push({
        comment: g.comment || "",
        date: r.date,
        reporter: r.reporter || "",
        saved_at_ms: r.saved_at_ms,
      });
    });
  });

  const ranking = [...tally.entries()]
    .map(([target, data]) => ({ target, ...data }))
    .sort((a, b) => b.count - a.count || a.target.localeCompare(b.target, "ja"));

  if (ranking.length > 0) {
    countBadge.textContent = ranking.length;
    countBadge.classList.remove("hidden");
  } else {
    countBadge.classList.add("hidden");
  }

  const monthLabel = `${now.getFullYear()}年${now.getMonth() + 1}月`;

  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const daysLeft = lastDay - now.getDate();
  const resetHint = daysLeft === 0
    ? "本日が月末です（明日リセット）"
    : `月末まで残り ${daysLeft} 日`;

  if (ranking.length === 0) {
    body.innerHTML = `
      <div class="text-center py-6">
        <div class="text-[12px] font-bold text-[var(--navy-700)] mb-1">${monthLabel}</div>
        <div class="text-[11px] text-[var(--muted)]">今月のgood jobの記録はまだありません</div>
        <div class="text-[10px] text-[var(--muted)] mt-2">${resetHint}</div>
      </div>`;
    return;
  }

  const medal = (rank) => {
    if (rank === 1) return `<span class="text-[18px]" style="line-height:1">🥇</span>`;
    if (rank === 2) return `<span class="text-[18px]" style="line-height:1">🥈</span>`;
    if (rank === 3) return `<span class="text-[18px]" style="line-height:1">🥉</span>`;
    return `<span class="num-tabular text-[12px] font-bold text-[var(--muted)] w-[18px] text-center inline-block">${rank}</span>`;
  };

  const topRanking = ranking.slice(0, 3);

  body.innerHTML = `
    <div class="flex items-center justify-between mb-2 px-1">
      <div class="text-[12px] font-bold text-[var(--navy-700)]">${monthLabel}</div>
      <div class="text-[10px] text-[var(--muted)]">${resetHint}</div>
    </div>
    <div class="text-[11px] text-[var(--muted)] mb-2 px-1">上位 ${topRanking.length}名${ranking.length > 3 ? `（全${ranking.length}名中）` : ""}</div>
    <div class="space-y-2">
      ${topRanking.map((r, i) => {
        const rank = i + 1;
        const recent = [...r.comments]
          .sort((a, b) => (b.saved_at_ms || 0) - (a.saved_at_ms || 0))
          .slice(0, 2);
        return `
          <div class="rounded-lg p-3" style="background:#ecfdf5;border:1px solid #d1fae5">
            <div class="flex items-center gap-2 mb-1.5">
              ${medal(rank)}
              <span class="font-bold text-[14px] text-[var(--navy-900)]">${escapeHtml(r.target)}</span>
              <span class="ml-auto text-[13px] font-bold num-tabular" style="color:var(--good)">${r.count}<span class="text-[10px] text-[var(--muted)] ml-1">pt</span></span>
            </div>
            ${recent.length > 0 ? `
              <div class="space-y-1 mt-2 pl-1">
                ${recent.map(c => `
                  <div class="text-[11px] text-[var(--navy-800)] leading-relaxed">
                    <span class="text-[var(--muted)] num-tabular">${c.date}</span>
                    ${c.comment ? `<span class="text-[var(--muted)]"> / </span><span>${escapeHtml(c.comment)}</span>` : `<span class="text-[var(--muted)] italic"> / （コメントなし）</span>`}
                  </div>
                `).join("")}
              </div>` : ""}
          </div>`;
      }).join("")}
    </div>
  `;
}

  return `

          <div class="font-display font-bold text-[15px] text-[var(--navy-900)] num-tabular">${r.date}</div>
          <div class="text-[11px] text-[var(--muted)] num-tabular">保存 ${r.saved_time} ・ ${escapeHtml(r.reporter || "(記録者未入力)")}</div>
        </div>
        <div class="text-right">
          <div class="text-[10px] text-[var(--muted)]">Ns / Dr</div>
          <div class="text-[14px] font-bold num-tabular text-[var(--navy-800)]">${r.team.nurses} / ${r.team.doctors}</div>
        </div>
      </div>
      ${histRatingsBlock(r)}
      ${histBreakBadBlock(r)}
      ${pat.comment ? `<div class="mt-2 text-[11px] text-[var(--navy-700)] bg-[var(--soft-info)] p-2 rounded-md"><span class="font-semibold">患者家族コメント</span><br>${escapeHtml(pat.comment)}</div>` : ""}
      ${histCasesBlock(r)}
      ${histGoodJobsBlock(r)}
      ${r.share ? `<div class="mt-2 text-[11px] text-[var(--navy-700)] bg-[var(--soft-info)] p-2 rounded-md"><span class="font-semibold">💬 共有事項</span><br>${escapeHtml(r.share)}</div>` : ""}
      ${r.updated_at_ms ? `<div class="mt-2 text-[10px] text-[var(--muted)] italic">※ ${formatUpdatedAt(r.updated_at_ms)}に修正</div>` : ""}

    </div>`;
}

function renderHistory() {
  const days = getActiveDays("#histFilter");
  const baseRecords = filterByDays(loadAll(), days);
  const filters = readFilters("hist");
  const records = applyFilters(baseRecords, filters);
  const list = $("#histList");

  renderRanking(loadAll());

  const activeFilterCount = Object.entries(filters).filter(([k,v]) => Array.isArray(v) ? v.length > 0 : (v && v !== "")).length;
  const filterNote = activeFilterCount
    ? `<div class="text-[11px] text-[var(--muted)] px-1 mb-1">${records.length}件表示（${baseRecords.length}件中 / ${activeFilterCount}項目で絞り込み中）</div>`
    : `<div class="text-[11px] text-[var(--muted)] px-1 mb-1">${records.length}件</div>`;

  if (!records.length) {
    list.innerHTML = `
      ${filterNote}
      <div class="card p-8 text-center">
        <div class="text-[13px] text-[var(--muted)]">該当する記録はありません</div>
      </div>`;
    return;
  }

  list.innerHTML = filterNote + records.map(histCardHtml).join("");

  $("#histList").querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (action === "edit") startEditRecord(id);
      else if (action === "delete") askDeleteRecord(id);
    });
  });
}

function rateToNum(r) {
  return r === "良い" ? 3 : r === "普通" ? 2 : r === "悪い" ? 1 : null;
}
function avg(arr) {
  const v = arr.filter(x => x !== null && !isNaN(x));
  return v.length ? (v.reduce((a,b)=>a+b,0) / v.length) : null;
}

function renderStats() {
  const days = getActiveDays("#statsFilter");
  const filters = readFilters("stats");
  const baseRecords = filterByDays(loadAll(), days);
  const records = applyFilters(baseRecords, filters);
  const el = $("#statsContent");

  const activeFilterCount = Object.entries(filters).filter(([k,v]) => Array.isArray(v) ? v.length > 0 : (v && v !== "")).length;
  const filterNote = activeFilterCount
    ? `<div class="text-[11px] text-[var(--muted)] px-1 mb-3">対象: ${records.length}件（全${baseRecords.length}件中 / ${activeFilterCount}項目で絞り込み中）</div>`
    : `<div class="text-[11px] text-[var(--muted)] px-1 mb-3">対象: ${records.length}件</div>`;

  if (!records.length) {
    el.innerHTML = `
      ${filterNote}
      <div class="card p-8 text-center">
        <div class="text-[13px] text-[var(--muted)]">該当するデータはありません</div>
      </div>`;
    return;
  }

  const teamMetrics = [
    { key: "team_collab", label: "チーム連携", group: "team_state" },
    { key: "external_collab", label: "他機関連携", group: "team_state" },
    { key: "psych_safety", label: "心理的安全性", group: "team_state" },
  ];
  const patientMetrics = [
    { key: "hospitality", label: "接遇", group: "patient_care" },
    { key: "wait_care", label: "待ち時間への配慮", group: "patient_care" },
    { key: "anxiety_relief", label: "不安軽減", group: "patient_care" },
  ];
  const distOf = (m) => {
    const vals = records.map(r => r[m.group][m.key]);
    return {
      good: vals.filter(v => v === "良い").length,
      mid:  vals.filter(v => v === "普通").length,
      bad:  vals.filter(v => v === "悪い").length,
    };
  };
  const addAvgAndDist = m => ({
    ...m,
    avg: avg(records.map(r => rateToNum(r[m.group][m.key]))),
    dist: distOf(m),
  });
  const teamAvgs = teamMetrics.map(addAvgAndDist);
  const patientAvgs = patientMetrics.map(addAvgAndDist);

  const breakSecuredCount = records.filter(r => r.workload.break_secured === "確保できた").length;
  const breakMissCount = records.filter(r => r.workload.break_secured === "確保できなかった").length;
  const breakSecuredRate = records.length ? (breakSecuredCount / records.length) * 100 : 0;
  const breakMissRate = records.length ? (breakMissCount / records.length) * 100 : 0;
  const helpYesCount = records.filter(r => r.workload.break_secured === "確保できなかった" && r.workload.help_requested === "あり").length;
  const helpNoCount = records.filter(r => r.workload.break_secured === "確保できなかった" && r.workload.help_requested === "なし").length;

  const renderBar = (m) => {
    const v = m.avg;
    const pct = v ? (v/3)*100 : 0;
    const color = v >= 2.5 ? "var(--good)" : v >= 1.5 ? "var(--mid)" : v ? "var(--bad)" : "var(--line-strong)";
    const total = m.dist.good + m.dist.mid + m.dist.bad;
    return `
      <div class="mb-3">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[12px] font-semibold text-[var(--navy-800)]">${m.label}</span>
          <span class="text-[13px] font-bold num-tabular" style="color:${color}">${v !== null ? v.toFixed(2) : "—"}<span class="text-[10px] text-[var(--muted)] ml-1">(n=${total})</span></span>
        </div>
        <div class="score-bar">
          <div style="width:${pct}%; background:${color}"></div>
        </div>
      </div>`;
  };

  const renderPie = (m) => {
    const total = m.dist.good + m.dist.mid + m.dist.bad;
    if (total === 0) {
      return `
        <div class="text-center">
          <div class="text-[12px] font-semibold text-[var(--navy-800)] mb-2">${m.label}</div>
          <div class="text-[11px] text-[var(--muted)] py-6">データなし</div>
        </div>`;
    }
    const cx = 50, cy = 50, r = 38;
    let angle = -Math.PI / 2;
    const segs = [
      { value: m.dist.good, color: "var(--good)", label: "良い" },
      { value: m.dist.mid,  color: "var(--mid)",  label: "普通" },
      { value: m.dist.bad,  color: "var(--bad)",  label: "悪い" },
    ].filter(s => s.value > 0);

    let paths = "";
    if (segs.length === 1) {
      paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${segs[0].color}"/>`;
    } else {
      segs.forEach(seg => {
        const ratio = seg.value / total;
        const endAngle = angle + ratio * Math.PI * 2;
        const x1 = cx + r * Math.cos(angle);
        const y1 = cy + r * Math.sin(angle);
        const x2 = cx + r * Math.cos(endAngle);
        const y2 = cy + r * Math.sin(endAngle);
        const large = ratio > 0.5 ? 1 : 0;
        paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${seg.color}"/>`;
        angle = endAngle;
      });
    }
    const innerR = 22;
    const centerCircle = `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="#fff"/>`;
    const centerText = `<text x="${cx}" y="${cy-1}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--navy-800)" font-family="'Zen Kaku Gothic New',sans-serif">${total}</text><text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="7" fill="var(--muted)">件</text>`;

    return `
      <div class="text-center">
        <div class="text-[12px] font-semibold text-[var(--navy-800)] mb-2">${m.label}</div>
        <svg viewBox="0 0 100 100" width="100%" style="max-width:140px;display:block;margin:0 auto">
          ${paths}
          ${centerCircle}
          ${centerText}
        </svg>
        <div class="flex items-center justify-center gap-2 mt-2 flex-wrap text-[10px]">
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:var(--good)"></span>${m.dist.good}</span>
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:var(--mid)"></span>${m.dist.mid}</span>
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:var(--bad)"></span>${m.dist.bad}</span>
        </div>
      </div>`;
  };

  const metricBlock = (title, icon, arr) => {
    const body = statsChartMode === "pie"
      ? `<div class="grid grid-cols-3 gap-2">${arr.map(renderPie).join("")}</div>`
      : `<div>${arr.map(renderBar).join("")}</div>`;
    return `
      <div class="card p-5 mb-4">
        <div class="flex items-center gap-2 mb-3">
          ${icon}
          <div class="text-[12px] font-semibold text-[var(--navy-700)]">${title}</div>
        </div>
        ${body}
      </div>`;
  };

  const statsIcon = `<svg viewBox="0 0 24 24" width="14" height="14" class="ico text-[var(--navy-700)]"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>`;

  let html = "";

  html += `
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="stat-tile">
        <div class="stat-label">記録数</div>
        <div class="stat-value num-tabular">${records.length}<span class="stat-unit">件</span></div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">休憩確保率</div>
        <div class="stat-value num-tabular" style="color: ${breakSecuredRate >= 75 ? 'var(--good)' : breakSecuredRate >= 50 ? 'var(--mid)' : 'var(--bad)'}">${breakSecuredRate.toFixed(0)}<span class="stat-unit">%</span></div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">休憩未確保</div>
        <div class="stat-value num-tabular" style="color: ${breakMissCount > 0 ? 'var(--bad)' : 'var(--muted)'}">${breakMissCount}<span class="stat-unit">件</span></div>
      </div>
    </div>`;

  {
    const securedPct = breakSecuredRate;
    const missPct = breakMissRate;
    const missRecords = records.filter(r => r.workload.break_secured === "確保できなかった");
    const avgShortMin = missRecords.length ? (missRecords.reduce((s, r) => s + (r.workload.short_min || 0), 0) / missRecords.length) : 0;
    const avgShortPeople = missRecords.length ? (missRecords.reduce((s, r) => s + (r.workload.short_people || 0), 0) / missRecords.length) : 0;

    const bucket10_30 = missRecords.filter(r => r.workload.short_min > 0 && r.workload.short_min <= 30).length;
    const bucket30_60 = missRecords.filter(r => r.workload.short_min > 30 && r.workload.short_min <= 60).length;
    const bucket60plus = missRecords.filter(r => r.workload.short_min > 60).length;
    const maxBucket = Math.max(bucket10_30, bucket30_60, bucket60plus, 1);

    const recentMiss = [...missRecords].sort((a,b) => b.saved_at_ms - a.saved_at_ms).slice(0, 5);

    html += `
      <div class="card p-5 mb-4">
        <div class="flex items-center gap-2 mb-3">
          <svg viewBox="0 0 24 24" width="14" height="14" class="ico text-[var(--navy-700)]"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
          <div class="text-[12px] font-semibold text-[var(--navy-700)]">休憩や時間外</div>
        </div>

        <div class="mb-4">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[12px] font-semibold text-[var(--navy-800)]">休憩確保率</span>
            <span class="text-[14px] font-bold num-tabular" style="color:${securedPct >= 75 ? 'var(--good)' : securedPct >= 50 ? 'var(--mid)' : 'var(--bad)'}">${securedPct.toFixed(1)}%</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden bg-[var(--line)]">
            <div style="width:${securedPct}%; background: var(--good)"></div>
            <div style="width:${missPct}%; background: var(--bad)"></div>
          </div>
          <div class="flex justify-between text-[10px] text-[var(--muted)] mt-1.5">
            <span>● 確保 ${breakSecuredCount}件</span>
            <span>● 未確保 ${breakMissCount}件</span>
          </div>
        </div>

        ${breakMissCount > 0 ? `
          <div class="pt-3 border-t border-[var(--line)]">
            <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">未確保時の状況（${breakMissCount}件）</div>

            <div class="grid grid-cols-2 gap-2 mb-3">
              <div class="p-2.5 rounded-lg bg-[var(--soft-info)]">
                <div class="text-[10px] text-[var(--muted)]">1件あたり平均不足</div>
                <div class="text-[17px] font-bold num-tabular text-[var(--navy-800)]">${avgShortMin.toFixed(0)}<span class="text-[11px] text-[var(--muted)] ml-0.5">分</span></div>
              </div>
              <div class="p-2.5 rounded-lg bg-[var(--soft-info)]">
                <div class="text-[10px] text-[var(--muted)]">1件あたり平均人数</div>
                <div class="text-[17px] font-bold num-tabular text-[var(--navy-800)]">${avgShortPeople.toFixed(1)}<span class="text-[11px] text-[var(--muted)] ml-0.5">名</span></div>
              </div>
            </div>

            <div class="mb-3">
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">不足時間の分布</div>
              <div class="space-y-2">
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">10〜30分</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket10_30/maxBucket)*100}%; background: var(--mid)"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket10_30}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">30〜60分</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket30_60/maxBucket)*100}%; background:#ea580c"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket30_60}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">60分〜</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket60plus/maxBucket)*100}%; background: var(--bad)"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket60plus}</span>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">応援要請</div>
              <div class="flex gap-2">
                <div class="flex-1 p-2.5 rounded-lg bg-[var(--soft-info)]">
                  <div class="text-[10px] text-[var(--muted)]">あり</div>
                  <div class="text-[16px] font-bold num-tabular text-[var(--navy-800)]">${helpYesCount}<span class="text-[11px] text-[var(--muted)] ml-0.5">件</span></div>
                </div>
                <div class="flex-1 p-2.5 rounded-lg" style="background:#fef2f2">
                  <div class="text-[10px] text-[var(--muted)]">なし</div>
                  <div class="text-[16px] font-bold num-tabular" style="color:var(--bad)">${helpNoCount}<span class="text-[11px] text-[var(--muted)] ml-0.5">件</span></div>
                </div>
              </div>
            </div>

            <div>
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">未確保だった勤務（直近${recentMiss.length}件）</div>
              <div class="space-y-1.5">
                ${recentMiss.map(r => `
                  <div class="flex items-center gap-2 p-2 rounded-md bg-[#fff7ed]">
                    <span class="badge ${r.shift === '夜勤' ? 'badge-night' : 'badge-day'}" style="flex-shrink:0">${r.shift === '夜勤' ? '🌙 夜勤' : '☀ 日勤'}</span>
                    <span class="text-[11px] num-tabular text-[var(--navy-800)] font-semibold">${r.date}</span>
                    <span class="text-[11px] text-[var(--muted)] flex-shrink-0">${escapeHtml(r.reporter || '')}</span>
                    <span class="ml-auto text-[11px] num-tabular font-bold" style="color:var(--bad)">${r.workload.short_min}分／${r.workload.short_people}名</span>
                    ${r.workload.help_requested === 'なし' ? `<span class="badge" style="background:#fef2f2;color:#b91c1c;flex-shrink:0">応援なし</span>` : ''}
                  </div>
                `).join("")}
              </div>
              ${missRecords.some(r => r.workload.no_help_reason) ? `
                <div class="mt-2 p-2.5 rounded-lg border border-[var(--line)]">
                  <div class="text-[10px] font-semibold text-[var(--muted)] mb-1">応援を要請しなかった理由（記載あり）</div>

                    <div class="text-[11px] text-[var(--navy-800)] leading-relaxed py-1 border-b border-[var(--line)] last:border-b-0">・${escapeHtml(r.workload.no_help_reason)} <span class="text-[10px] text-[var(--muted)] ml-1 num-tabular">${r.date}</span></div>
                  `).join("")}
                </div>` : ""}
            </div>
          </div>` : `
          <div class="pt-3 border-t border-[var(--line)] text-center text-[12px] text-[var(--muted)]">
            ✓ この期間に休憩未確保の記録はありません
          </div>`}
      </div>`;
  }

  html += `
    <div class="flex items-center justify-end mb-3">
      <div class="inline-flex rounded-lg overflow-hidden border border-[var(--line-strong)]" style="background:#fff">
        <button type="button" class="text-[11px] font-semibold py-1.5 px-3 flex items-center gap-1" data-chart-mode="bar" style="${statsChartMode === 'bar' ? 'background:var(--navy-800);color:#fff' : 'color:var(--navy-700)'}">
          <svg viewBox="0 0 24 24" width="12" height="12" class="ico"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
          棒
        </button>
        <button type="button" class="text-[11px] font-semibold py-1.5 px-3 flex items-center gap-1" data-chart-mode="pie" style="${statsChartMode === 'pie' ? 'background:var(--navy-800);color:#fff' : 'color:var(--navy-700)'}">
          <svg viewBox="0 0 24 24" width="12" height="12" class="ico"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          円
        </button>
      </div>
    </div>`;

  html += metricBlock("チームの状態", statsIcon, teamAvgs);
  html += metricBlock("患者家族への関わり", statsIcon, patientAvgs);

  el.innerHTML = filterNote + html;

  el.querySelectorAll('[data-chart-mode]').forEach(btn => {
    btn.addEventListener("click", () => {
      const mode = btn.dataset.chartMode;
      if (mode !== statsChartMode) {
        statsChartMode = mode;
        renderStats();
      }
    });
  });
}

function setupExport() {
  $("#exportBtn").addEventListener("click", () => {
    $("#pinInput").value = "";
    $("#pinError").classList.add("hidden");
    updatePinDots("");
    openModal("pinModal");
    setTimeout(() => $("#pinInput").focus(), 100);
  });
  $("#pinInput").addEventListener("input", (e) => {
    const v = e.target.value.replace(/\D/g, "").slice(0,4);
    e.target.value = v;
    updatePinDots(v);
    $("#pinError").classList.add("hidden");
  });
  $("#pinInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      $("#pinConfirmBtn").click();
    }
  });
  $("#pinConfirmBtn").addEventListener("click", () => {
    const v = $("#pinInput").value;
    if (v === PIN_CODE) {
      closeModal("pinModal");
      doExport();
    } else {
      $("#pinError").classList.remove("hidden");
    }
  });
}
function updatePinDots(v) {
  $$("#pinDots .pin-dot").forEach((d, i) => {
    d.dataset.filled = v.length > i ? "true" : "false";
    d.textContent = v[i] ? "●" : "";
  });
}

function doExport() {
  const records = loadAll();
  if (!records.length) {
    toast("エクスポートするデータがありません");
    return;
  }
  const headers = [
    "No.","日付","保存時刻","勤務帯","記録者","看護師数","医師数",
    "休憩確保","不足時間(分)","対象人数","応援要請","応援なし理由",
    "チーム連携","チーム連携_場面","他機関連携","他機関連携_場面","心理的安全性","心理的安全性_場面",
    "接遇","待ち時間配慮","不安軽減","患者家族コメント",
    "ケース有無","ケース件数","搬送区分（｜区切り）","ケースID（｜区切り）","ケース内容（｜｜区切り）",
    "good job数","good job対象者（｜区切り）","good jobコメント（｜｜区切り）",
    "共有事項","修正日時"
  ];
  const sortedRecords = [...records].sort((a, b) => (a.saved_at_ms || 0) - (b.saved_at_ms || 0));
  const rows = sortedRecords.map((r, idx) => {
    const gjList = getGoodJobs(r);
    const gjTargets = gjList.map(g => g.target || "").join("｜");
    const gjComments = gjList.map(g => (g.comment || "").replace(/\n/g, " ")).join("｜｜");
    const caseItems = getCaseItems(r);
    const caseTypes = caseItems.map(it => it.type || "").join("｜");
    const caseIds = caseItems.map(it => it.case_id || "").join("｜");
    const caseContents = caseItems.map(it => (it.content || "").replace(/\n/g, " ")).join("｜｜");
    return [
      idx + 1, r.date, r.saved_time, r.shift || "", r.reporter || "",
      r.team.nurses, r.team.doctors,
      r.workload.break_secured || "", r.workload.short_min || 0, r.workload.short_people || 0,
      r.workload.help_requested || "", r.workload.no_help_reason || "",
      r.team_state.team_collab || "", r.team_state.team_collab_note || "",
      r.team_state.external_collab || "", r.team_state.external_collab_note || "",
      r.team_state.psych_safety || "", r.team_state.psych_safety_note || "",
      r.patient_care.hospitality || "", r.patient_care.wait_care || "", r.patient_care.anxiety_relief || "", r.patient_care.comment || "",
      r.case.exists || "", caseItems.length, caseTypes, caseIds, caseContents,
      gjList.length, gjTargets, gjComments,
      r.share || "",
      r.updated_at_ms ? formatUpdatedAt(r.updated_at_ms) : ""
    ];
  });
  const csv = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell ?? "");
      return /[",\n\r]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(",")
  ).join("\r\n");

  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  a.href = url;
  a.download = `ER_reflection_${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}_${pad2(d.getHours())}${pad2(d.getMinutes())}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("CSVをダウンロードしました");
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
