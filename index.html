<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>浦添ER 振り返り共有シート</title>
<!-- Tailwind CDN: 本番用警告を抑制（プロトタイプ用途） -->
<script>
  // Tailwindの本番警告を無効化
  const originalWarn = console.warn;
  console.warn = function(...args) {
    if (args[0] && String(args[0]).includes('cdn.tailwindcss.com')) return;
    originalWarn.apply(console, args);
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-900: #0b1e3f;
    --navy-800: #12284d;
    --navy-700: #1b3a6b;
    --navy-600: #26518f;
    --blue-500: #2f6fb8;
    --blue-400: #4a8dd3;
    --accent: #3b82f6;
    --paper: #fafbfc;
    --line: #e3e8ef;
    --line-strong: #cfd6e0;
    --muted: #6b7a8f;
    --good: #059669;
    --mid: #d97706;
    --bad: #dc2626;
    --soft-warn: #fff7ed;
    --soft-info: #eef4fb;
    --soft-alert: #fef2f2;
  }
  html, body {
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    background: var(--paper);
    color: var(--navy-900);
    -webkit-tap-highlight-color: transparent;
  }
  .font-display { font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif; letter-spacing: 0.02em; }
  .num-tabular { font-variant-numeric: tabular-nums; }

  /* Section card */
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
  }

  /* Input base */
  .fld {
    width: 100%;
    box-sizing: border-box;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px; /* prevent iOS zoom */
    color: var(--navy-900);
    transition: border-color .15s, box-shadow .15s, background .15s;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
  }
  .fld:focus {
    outline: none;
    border-color: var(--blue-500);
    box-shadow: 0 0 0 3px rgba(47,111,184,0.15);
  }
  /* iOS Safari: type=date が大きく表示される問題を抑制 */
  input[type="date"].fld {
    min-height: 48px;
    line-height: 1.2;
    display: block;
  }
  input[type="date"].fld::-webkit-date-and-time-value {
    text-align: left;
    min-height: 1.2em;
  }
  input[type="number"].fld { -moz-appearance: textfield; }
  textarea.fld { min-height: 76px; resize: vertical; line-height: 1.55; }
  select.fld {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%231b3a6b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 40px;
  }

  /* Pill / segmented */
  .seg {
    display: grid;
    gap: 8px;
    width: 100%;
  }
  .seg-2 { grid-template-columns: 1fr 1fr; }
  .seg-3 { grid-template-columns: repeat(3, 1fr); }
  .seg-btn {
    border: 1.5px solid var(--line-strong);
    background: #fff;
    color: var(--navy-900);
    border-radius: 10px;
    padding: 13px 8px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    transition: all .12s ease;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    user-select: none;
    cursor: pointer;
  }
  .seg-btn:active { transform: scale(0.98); }
  .seg-btn[data-selected="true"] {
    background: var(--navy-800);
    color: #fff;
    border-color: var(--navy-800);
    box-shadow: 0 4px 14px -6px rgba(11,30,63,0.4);
  }
  .seg-btn[data-val="良い"][data-selected="true"] {
    background: var(--good); border-color: var(--good);
  }
  .seg-btn[data-val="普通"][data-selected="true"] {
    background: var(--mid); border-color: var(--mid);
  }
  .seg-btn[data-val="悪い"][data-selected="true"] {
    background: var(--bad); border-color: var(--bad);
  }
  .seg-btn[data-val="確保できなかった"][data-selected="true"] {
    background: var(--bad); border-color: var(--bad);
  }
  .seg-btn[data-val="確保できた"][data-selected="true"] {
    background: var(--good); border-color: var(--good);
  }

  /* Conditional blocks */
  .cond {
    display: none;
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    border: 1px dashed var(--line-strong);
    background: var(--soft-warn);
    animation: slideIn .2s ease;
  }
  .cond-info {
    background: var(--soft-info);
  }
  .cond-alert {
    background: var(--soft-alert);
    border-color: #fecaca;
  }
  .cond[data-show="true"] { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Label */
  .lbl {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy-700);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
  }
  .lbl-required::after {
    content: "※";
    color: #dc2626;
    margin-left: 4px;
    font-weight: 700;
  }

  /* Section header */
  .sec-head {
    margin-bottom: 14px;
  }
  .sec-title {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--navy-900);
    line-height: 1.4;
  }
  .sec-title-required::after {
    content: "※";
    color: #dc2626;
    margin-left: 4px;
    font-weight: 700;
  }
  .sec-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Tabs */
  .tab-btn {
    flex: 1;
    padding: 11px 8px;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all .15s;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 48px;
  }
  .tab-btn[data-active="true"] {
    color: var(--navy-800);
    border-bottom-color: var(--navy-800);
  }

  /* History card */
  .hist-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    transition: border-color .15s;
  }
  .hist-card:hover { border-color: var(--blue-400); }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-day { background: #fef3c7; color: #92400e; }
  .badge-night { background: #1e1b4b; color: #c7d2fe; }

  /* Primary button */
  .btn-primary {
    background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
    color: #fff;
    font-weight: 700;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    letter-spacing: 0.04em;
    box-shadow: 0 8px 20px -10px rgba(11,30,63,0.5);
    transition: transform .1s, box-shadow .15s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: #fff;
    border: 1.5px solid var(--line-strong);
    color: var(--navy-800);
    font-weight: 600;
    padding: 12px;
    border-radius: 10px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(11,30,63,0.55);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-backdrop[data-open="true"] { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Stat tile */
  .stat-tile {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; font-weight: 600; }
  .stat-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 22px; color: var(--navy-800); }
  .stat-unit { font-size: 12px; color: var(--muted); margin-left: 2px; font-weight: 500; }

  /* Score bar */
  .score-bar {
    height: 6px; border-radius: 3px; background: var(--line);
    overflow: hidden; position: relative;
  }
  .score-bar > div { height: 100%; border-radius: 3px; transition: width .4s ease; }

  /* Icon */
  .ico { stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }

  /* Filter chips */
  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    color: var(--navy-700);
    cursor: pointer;
    transition: all .1s;
  }
  .chip[data-active="true"] {
    background: var(--navy-800);
    color: #fff;
    border-color: var(--navy-800);
  }
  /* 3-value filter chips (良い/普通/悪い) */
  .chip[data-active="true"][data-val="良い"] { background: var(--good); border-color: var(--good); }
  .chip[data-active="true"][data-val="普通"] { background: var(--mid); border-color: var(--mid); }
  .chip[data-active="true"][data-val="悪い"] { background: var(--bad); border-color: var(--bad); }
  .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-row { margin-bottom: 14px; }
  .filter-row:last-of-type { margin-bottom: 0; }

  /* Collapsible filter panel */
  .filter-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 2px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--navy-700);
  }
  .filter-toggle-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-toggle-chevron {
    transition: transform .2s ease;
    color: var(--muted);
  }
  .filter-panel[data-open="false"] .filter-toggle-chevron {
    transform: rotate(-90deg);
  }
  .filter-body {
    overflow: hidden;
    transition: max-height .25s ease, opacity .2s ease, margin-top .2s ease;
    max-height: 2000px;
    opacity: 1;
    margin-top: 14px;
  }
  .filter-panel[data-open="false"] .filter-body {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
  }
  .filter-count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--navy-800);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Subtle hero grid */
  .hero {
    background:
      radial-gradient(circle at 100% 0%, rgba(74,141,211,0.14), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(11,30,63,0.08), transparent 50%),
      linear-gradient(180deg, #fff, #f3f6fa);
    border-bottom: 1px solid var(--line);
  }
  .hero-mark {
    width: 36px; height: 36px;
    background: var(--navy-800);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }

  /* PIN dots */
  .pin-dot {
    width: 44px; height: 52px;
    border: 1.5px solid var(--line-strong);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    color: var(--navy-800);
    background: #fff;
  }
  .pin-dot[data-filled="true"] { border-color: var(--navy-800); background: var(--soft-info); }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--navy-800); color: #fff;
    padding: 12px 20px; border-radius: 16px;
    font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 60;
    max-width: calc(100vw - 40px);
    text-align: center;
    line-height: 1.5;
  }
  .toast[data-show="true"] { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* Small helpers */
  .hr-soft { height: 1px; background: var(--line); margin: 18px 0; }
  .kbd {
    display: inline-block; padding: 1px 6px;
    background: var(--soft-info); color: var(--navy-700);
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }

  /* Scroll tabs */
  .tabs-wrap {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  /* Notification bell */
  .bell-btn {
    position: relative;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--navy-700);
    cursor: pointer;
    flex-shrink: 0;
  }
  .bell-btn:active { background: var(--soft-info); border-radius: 8px; }
  .bell-badge {
    position: absolute;
    top: 6px;
    right: 4px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--bad);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    line-height: 1;
  }
  .bell-badge.hidden { display: none; }

  /* Share notification list modal */
  .share-modal {
    background: #fff;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalIn .2s ease;
  }
  .share-modal-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .share-modal-body {
    overflow-y: auto;
    padding: 14px;
    flex: 1;
    background: var(--paper);
  }
  .share-card {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: border-color .15s;
  }
  .share-card[data-unread="true"] {
    border-left-color: var(--blue-500);
    background: linear-gradient(90deg, var(--soft-info) 0%, #fff 30%);
  }
  .share-card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .share-card-body {
    font-size: 13px;
    line-height: 1.7;
    color: var(--navy-900);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .share-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Number stepper */
  .stepper { display: flex; align-items: stretch; border: 1.5px solid var(--line-strong); border-radius: 10px; overflow: hidden; background: #fff; width: 100%; min-height: 52px; box-sizing: border-box; }
  .stepper button { flex: 0 0 42px; font-size: 20px; font-weight: 700; color: var(--navy-700); background: #fafbfc; box-sizing: border-box; }
  .stepper button:active { background: var(--soft-info); }
  .stepper input { flex: 1; min-width: 0; width: 100%; text-align: center; font-size: 17px; font-weight: 700; border: none; outline: none; color: var(--navy-900); background: #fff; padding: 0 4px; box-sizing: border-box; -webkit-appearance: none; appearance: none; -moz-appearance: textfield; }
  .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body class="pb-24">

<!-- ============ HERO ============ -->
<header class="hero px-5 pt-6 pb-5">
  <div class="max-w-xl mx-auto">
    <div class="flex items-center gap-3 mb-2">
      <div class="hero-mark">
        <svg viewBox="0 0 24 24" width="20" height="20" class="ico"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M12 14v4"/><path d="M10 16h4"/></svg>
      </div>
      <div>
        <div class="text-[10px] font-bold tracking-[0.25em] text-[var(--blue-500)]">浦添ER</div>
        <h1 class="font-display font-bold text-[19px] leading-tight text-[var(--navy-900)]">振り返り共有シート</h1>
      </div>
    </div>
  </div>
</header>

<!-- ============ TABS ============ -->
<div class="tabs-wrap">
  <div class="max-w-xl mx-auto flex items-stretch">
    <button class="tab-btn" data-tab="input" data-active="true">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      入力
    </button>
    <button class="tab-btn" data-tab="history">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      履歴
    </button>
    <button class="tab-btn" data-tab="stats">
      <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
      統計
    </button>
    <button class="bell-btn" id="bellBtn" aria-label="共有事項の通知">
      <svg viewBox="0 0 24 24" width="20" height="20" class="ico"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <span class="bell-badge hidden" id="bellBadge">0</span>
    </button>
  </div>
</div>

<main class="max-w-xl mx-auto px-4 pt-4 space-y-4">

  <!-- =========== TAB: INPUT =========== -->
  <section id="tab-input" class="space-y-4">

    <!-- 基本情報 -->
    <div class="card p-5">
      <div class="sec-head">
        <div class="sec-title">基本情報</div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="lbl lbl-required">日付</label>
          <input type="date" id="f_date" class="fld num-tabular" />
        </div>
        <div class="col-span-2">
          <label class="lbl lbl-required">勤務帯</label>
          <div class="seg seg-2" data-seg-field="shift">
            <button class="seg-btn" data-val="日勤">
              <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
              日勤
            </button>
            <button class="seg-btn" data-val="夜勤">
              <svg viewBox="0 0 24 24" width="16" height="16" class="ico"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
              夜勤
            </button>
          </div>
        </div>
        <div>
          <label class="lbl lbl-required">看護師（人）</label>
          <div class="stepper">
            <button type="button" data-stp="f_nurses" data-delta="-1">−</button>
            <input type="number" id="f_nurses" min="0" value="0" />
            <button type="button" data-stp="f_nurses" data-delta="1">+</button>
          </div>
        </div>
        <div>
          <label class="lbl lbl-required">医師（人）</label>
          <div class="stepper">
            <button type="button" data-stp="f_doctors" data-delta="-1">−</button>
            <input type="number" id="f_doctors" min="0" value="0" />
            <button type="button" data-stp="f_doctors" data-delta="1">+</button>
          </div>
        </div>
        <div class="col-span-2">
          <label class="lbl lbl-required">記録者名</label>
          <input type="text" id="f_reporter" class="fld" list="reporterList" autocomplete="off" />
          <datalist id="reporterList"></datalist>
        </div>
      </div>
    </div>

const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const todayIso = () => {
  const d = new Date();
  const z = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
};
const nowTime = () => {
  const d = new Date();
  const z = n => String(n).padStart(2,"0");
  return `${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
};
const loadAll = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
};
const saveAll = arr => localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));

const toast = (msg) => {
  const t = $("#toast");
  t.textContent = msg;
  t.dataset.show = "true";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.dataset.show = "false", 2200);
};

// ------------ Init ------------
function init() {
  $("#f_date").value = todayIso();

  setupSegmented();
  setupSteppers();
  setupTabs();
  setupFilters();
  setupSaveFlow();
  setupExport();
  setupNotification();
  refreshReporterList();
  refreshNotificationBadge();

  renderHistory();
  renderStats();
}

// 記録者名の予測候補（過去記録から生成）
function refreshReporterList() {
  const dl = $("#reporterList");
  if (!dl) return;
  const names = [...new Set(
    loadAll()
      .map(r => (r.reporter || "").trim())
      .filter(Boolean)
  )].sort((a,b) => a.localeCompare(b, "ja"));
  dl.innerHTML = names.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
}

// ------------ Notification (Share items) ------------
const loadReadIds = () => {
  try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]")); }
  catch { return new Set(); }
};
const saveReadIds = (set) => localStorage.setItem(READ_KEY, JSON.stringify([...set]));

// 共有事項のある記録のみ抽出（新しい順）
function getShareRecords() {
  return loadAll()
    .filter(r => r.share && r.share.trim())
    .sort((a,b) => b.saved_at_ms - a.saved_at_ms);
}

// 未読件数を計算してバッジを更新
function refreshNotificationBadge() {
  const badge = $("#bellBadge");
  if (!badge) return;
  const readIds = loadReadIds();
  const shareRecords = getShareRecords();
  const unreadCount = shareRecords.filter(r => !readIds.has(r.id)).length;
  if (unreadCount > 0) {
    badge.textContent = unreadCount > 99 ? "99+" : unreadCount;
    badge.classList.remove("hidden");
  } else {
    badge.classList.add("hidden");
  }
}

// 共有事項モーダルを開く（同時に表示された未読を全て既読化）
function openShareModal() {
  const shareRecords = getShareRecords();
  const readIds = loadReadIds();
  const body = $("#shareModalBody");
  const countEl = $("#shareModalCount");

  countEl.textContent = `${shareRecords.length}件`;

  if (!shareRecords.length) {
    body.innerHTML = `<div class="share-empty">共有事項の記録はまだありません</div>`;
  } else {
    body.innerHTML = shareRecords.map(r => {
      const isUnread = !readIds.has(r.id);
      const shiftBadge = r.shift === "夜勤"
        ? `<span class="badge badge-night">🌙 夜勤</span>`
        : `<span class="badge badge-day">☀ 日勤</span>`;
      return `
        <div class="share-card" data-unread="${isUnread}">
          <div class="share-card-meta">
            ${shiftBadge}
            <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)]">${r.date}</span>
            ${isUnread ? `<span class="badge" style="background:#dbeafe;color:#1e40af;margin-left:auto">NEW</span>` : ""}
          </div>
          <div class="share-card-body">${escapeHtml(r.share)}</div>
        </div>
      `;
    }).join("");
  }

  openModal("shareModal");

  // 表示された全件を既読化（少し遅らせてアニメーションを見せる）
  setTimeout(() => {
    const newReadIds = loadReadIds();
    let changed = false;
    shareRecords.forEach(r => {
      if (!newReadIds.has(r.id)) {
        newReadIds.add(r.id);
        changed = true;
      }
    });
    if (changed) {
      saveReadIds(newReadIds);
      refreshNotificationBadge();
    }
  }, 600);
}

function setupNotification() {
  $("#bellBtn").addEventListener("click", openShareModal);
}

// ------------ Segmented buttons ------------
function setupSegmented() {
  $$("[data-seg-field]").forEach(group => {
    const field = group.dataset.segField;
    group.addEventListener("click", (e) => {
      const btn = e.target.closest(".seg-btn");
      if (!btn) return;
      const val = btn.dataset.val;
      // toggle
      $$(".seg-btn", group).forEach(b => b.dataset.selected = (b === btn ? "true" : "false"));
      formState[field] = val;
      handleConditionals(field, val);
    });
  });
}

function handleConditionals(field, val) {
  if (field === "break_secured") {
    const box = $("#break_detail");
    box.dataset.show = (val === "確保できなかった") ? "true" : "false";
    if (val !== "確保できなかった") {
      // reset nested
      formState.help_requested = null;
      $$('[data-seg-field="help_requested"] .seg-btn').forEach(b => b.dataset.selected = "false");
      $("#help_no_reason").dataset.show = "false";
      $("#f_short_min").value = 0;
      $("#f_short_people").value = 1;
      $("#f_no_help_reason").value = "";
    }
  }
  if (field === "help_requested") {
    $("#help_no_reason").dataset.show = (val === "なし") ? "true" : "false";
    if (val !== "なし") $("#f_no_help_reason").value = "";
  }
  if (field === "case_exists") {
    $("#case_detail").dataset.show = (val === "あり") ? "true" : "false";
    if (val !== "あり") {
      $("#f_case_type").value = "";
      $("#f_case_id").value = "";
      $("#f_case_content").value = "";
    }
  }
}

// ------------ Number steppers ------------
function setupSteppers() {
  $$("[data-stp]").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = $("#" + btn.dataset.stp);
      const delta = parseInt(btn.dataset.delta, 10);
      const current = parseInt(input.value || "0", 10);
      const next = Math.max(0, current + delta);
      input.value = next;
    });
  });
}

// ------------ Tabs ------------
function setupTabs() {
  $$(".tab-btn").forEach(b => {
    b.addEventListener("click", () => {
      const target = b.dataset.tab;
      $$(".tab-btn").forEach(x => x.dataset.active = (x === b ? "true" : "false"));
      $("#tab-input").classList.toggle("hidden", target !== "input");
      $("#tab-history").classList.toggle("hidden", target !== "history");
      $("#tab-stats").classList.toggle("hidden", target !== "stats");
      if (target === "history") renderHistory();
      if (target === "stats") renderStats();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

// ------------ Filters ------------
function setupFilters() {
  // 折りたたみトグル
  $$('[data-filter-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const kind = btn.dataset.filterToggle;
      const panel = $(`#${kind}FilterPanel`);
      panel.dataset.open = panel.dataset.open === "true" ? "false" : "true";
    });
  });

  // チップ押下の共通ハンドラ（単一選択 or 複数選択をdata-modeで分岐）
  $$(".chip-group").forEach(group => {
    group.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      const mode = group.dataset.mode || "multi";
      if (mode === "single") {
        $$(".chip", group).forEach(c => c.dataset.active = (c === btn ? "true" : "false"));
      } else {
        btn.dataset.active = btn.dataset.active === "true" ? "false" : "true";
      }
      const kind = group.dataset.filterKind;
      if (kind === "hist") { updateFilterCountBadge("hist"); renderHistory(); }
      if (kind === "stats") { updateFilterCountBadge("stats"); renderStats(); }
    });
  });

  // フリー検索（履歴・統計）
  $("#histFreeSearch").addEventListener("input", debounce(() => { updateFilterCountBadge("hist"); renderHistory(); }, 180));
  $("#statsFreeSearch").addEventListener("input", debounce(() => { updateFilterCountBadge("stats"); renderStats(); }, 180));

  // リセットボタン
  $("#histClearBtn").addEventListener("click", () => {
    clearChipGroups("hist");
    $("#histFreeSearch").value = "";
    updateFilterCountBadge("hist");
    renderHistory();
  });
  $("#statsClearBtn").addEventListener("click", () => {
    clearChipGroups("stats");
    $("#statsFreeSearch").value = "";
    updateFilterCountBadge("stats");
    renderStats();
  });

  // 初期バッジ
  updateFilterCountBadge("hist");
  updateFilterCountBadge("stats");
}

// 絞り込み件数バッジ更新（期間チップは含めず、絞り込み項目とフリー検索のみカウント）
function updateFilterCountBadge(kind) {
  const badge = $(`#${kind}FilterCount`);
  if (!badge) return;
  let count = 0;
  $$(`.chip-group[data-filter-kind="${kind}"]`).forEach(group => {
    const key = group.dataset.filterKey;
    if (key === "days") return; // 期間は常に必ず1つ選ばれている前提でカウントしない
    const selected = $$('.chip[data-active="true"]', group);
    if (selected.length > 0) count++;
  });
  const search = kind === "hist" ? $("#histFreeSearch").value.trim() : $("#statsFreeSearch").value.trim();
  if (search) count++;
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove("hidden");
  } else {
    badge.classList.add("hidden");
  }
}

function clearChipGroups(kind) {
  $$(`.chip-group[data-filter-kind="${kind}"]`).forEach(group => {
    const mode = group.dataset.mode;
    const key = group.dataset.filterKey;
    $$(".chip", group).forEach(c => {
      if (mode === "single" && key === "days") {
        c.dataset.active = (c.dataset.days === "7" ? "true" : "false");
      } else {
        c.dataset.active = "false";
      }
    });
  });
}

function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

// チップグループから選択値の配列を取り出す
function getSelectedChipValues(kind, key) {
  const group = $(`.chip-group[data-filter-kind="${kind}"][data-filter-key="${key}"]`);
  if (!group) return [];
  return $$('.chip[data-active="true"]', group).map(c => c.dataset.val).filter(Boolean);
}

// ------------ Save Flow ------------
function setupSaveFlow() {
  $("#saveBtn").addEventListener("click", () => {
    // Minimal validation
    const missing = [];
    if (!$("#f_date").value) missing.push("日付");
    if (!formState.shift) missing.push("勤務帯");
    if (!$("#f_reporter").value.trim()) missing.push("記録者名");
    if (!formState.break_secured) missing.push("休憩の確保");
    // チームの状態：3項目とも必須
    if (!formState.team_collab) missing.push("チーム連携");
    if (!formState.external_collab) missing.push("他関連機関との連携");
    if (!formState.psych_safety) missing.push("心理的安全性");
    // 患者・家族への関わり：3項目とも必須
    if (!formState.hospitality) missing.push("接遇面");
    if (!formState.wait_care) missing.push("待ち時間への配慮");
    if (!formState.anxiety_relief) missing.push("不安軽減");
    // 振り返りケース：あり/なしは必須
    if (!formState.case_exists) missing.push("振り返りケース");
    if (missing.length) {
      toast(`未入力: ${missing.join(" / ")}`);
      return;
    }
    openModal("confirmModal");
  });

  $("#confirmSaveBtn").addEventListener("click", () => {
    const record = buildRecord();
    const all = loadAll();
    all.push(record);
    saveAll(all);
    refreshReporterList();
    refreshNotificationBadge();
    closeModal("confirmModal");
    openModal("postSaveModal");
  });

  $("#postCloseBtn").addEventListener("click", () => {
    closeModal("postSaveModal");
    refreshNotificationBadge();
  });
  $("#postNewBtn").addEventListener("click", () => {
    closeModal("postSaveModal");
    resetForm();
    refreshNotificationBadge();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

function buildRecord() {
  const readNote = name => {
    const el = $(`[data-note="${name}"]`);
    return el ? el.value.trim() : "";
  };
  return {
    id: "r_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    date: $("#f_date").value,
    saved_time: nowTime(),
    saved_at_ms: Date.now(),
    shift: formState.shift,
    team: {
      nurses: parseInt($("#f_nurses").value || "0", 10),
      doctors: parseInt($("#f_doctors").value || "0", 10),
    },
    reporter: $("#f_reporter").value.trim(),
    workload: {
      break_secured: formState.break_secured,
      short_min: formState.break_secured === "確保できなかった" ? parseInt($("#f_short_min").value || "0", 10) : 0,
      short_people: formState.break_secured === "確保できなかった" ? parseInt($("#f_short_people").value || "0", 10) : 0,
      help_requested: formState.break_secured === "確保できなかった" ? formState.help_requested : null,
      no_help_reason: (formState.break_secured === "確保できなかった" && formState.help_requested === "なし") ? $("#f_no_help_reason").value.trim() : "",
    },
    team_state: {
      team_collab: formState.team_collab,
      team_collab_note: readNote("team_collab_note"),
      external_collab: formState.external_collab,
      external_collab_note: readNote("external_collab_note"),
      psych_safety: formState.psych_safety,
      psych_safety_note: readNote("psych_safety_note"),
    },
    patient_care: {
      hospitality: formState.hospitality,
      wait_care: formState.wait_care,
      anxiety_relief: formState.anxiety_relief,
      comment: $("#f_patient_comment").value.trim(),
    },
    case: {
      exists: formState.case_exists,
      type: formState.case_exists === "あり" ? $("#f_case_type").value : "",
      case_id: formState.case_exists === "あり" ? $("#f_case_id").value.trim() : "",
      content: formState.case_exists === "あり" ? $("#f_case_content").value.trim() : "",
    },
    share: $("#f_share").value.trim(),
  };
}

function resetForm() {
  formState = {
    shift: null, break_secured: null, help_requested: null, case_exists: null,
    team_collab: null, external_collab: null, psych_safety: null,
    hospitality: null, wait_care: null, anxiety_relief: null,
  };
  $("#f_date").value = todayIso();
  $("#f_nurses").value = 0;
  $("#f_doctors").value = 0;
  $("#f_reporter").value = "";
  $("#f_short_min").value = 0;
  $("#f_short_people").value = 1;
  $("#f_no_help_reason").value = "";
  $("#f_case_type").value = "";
  $("#f_case_id").value = "";
  $("#f_case_content").value = "";
  $("#f_patient_comment").value = "";
  $("#f_share").value = "";
  $$("[data-note]").forEach(el => el.value = "");
  $$(".seg-btn").forEach(b => b.dataset.selected = "false");
  $("#break_detail").dataset.show = "false";
  $("#help_no_reason").dataset.show = "false";
  $("#case_detail").dataset.show = "false";
}

// ------------ Modal ------------
function openModal(id) { $("#"+id).dataset.open = "true"; document.body.style.overflow="hidden"; }
function closeModal(id) { $("#"+id).dataset.open = "false"; document.body.style.overflow=""; }

// ------------ History ------------
function getActiveDays(filterSel) {
  const a = $(`${filterSel} .chip[data-active="true"]`);
  return a ? parseInt(a.dataset.days, 10) : 7;
}
function filterByDays(records, days) {
  if (!days || days <= 0) return [...records].sort((a,b) => b.saved_at_ms - a.saved_at_ms);
  const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
  return records.filter(r => r.saved_at_ms >= cutoff)
    .sort((a,b) => b.saved_at_ms - a.saved_at_ms);
}

// 共通フィルタ適用（配列が渡された場合はOR条件、空配列は「絞り込みなし」）
function applyFilters(records, f) {
  const has = arr => Array.isArray(arr) && arr.length > 0;
  return records.filter(r => {
    if (has(f.shift) && !f.shift.includes(r.shift)) return false;
    if (has(f.break_secured) && !f.break_secured.includes(r.workload.break_secured)) return false;
    if (has(f.team_state)) {
      const vals = [r.team_state.team_collab, r.team_state.external_collab, r.team_state.psych_safety];
      if (!f.team_state.some(v => vals.includes(v))) return false;
    }
    if (has(f.patient_care)) {
      const vals = [r.patient_care.hospitality, r.patient_care.wait_care, r.patient_care.anxiety_relief];
      if (!f.patient_care.some(v => vals.includes(v))) return false;
    }
    if (has(f.case_exists) && !f.case_exists.includes(r.case.exists)) return false;
    if (has(f.share)) {
      const label = (r.share && r.share.trim()) ? "あり" : "なし";
      if (!f.share.includes(label)) return false;
    }
    if (f.q) {
      const q = f.q.toLowerCase();
      const text = [
        r.reporter, r.share,
        r.team_state.team_collab_note, r.team_state.external_collab_note, r.team_state.psych_safety_note,
        r.patient_care.comment,
        r.case.type, r.case.case_id, r.case.content,
        r.workload.no_help_reason,
      ].filter(Boolean).join(" ").toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });
}

function readHistFilters() {
  return {
    shift: getSelectedChipValues("hist", "shift"),
    break_secured: getSelectedChipValues("hist", "break_secured"),
    team_state: getSelectedChipValues("hist", "team_state"),
    patient_care: getSelectedChipValues("hist", "patient_care"),
    case_exists: getSelectedChipValues("hist", "case_exists"),
    share: getSelectedChipValues("hist", "share"),
    q: $("#histFreeSearch").value.trim(),
  };
}
function readStatsFilters() {
  return {
    shift: getSelectedChipValues("stats", "shift"),
    break_secured: getSelectedChipValues("stats", "break_secured"),
    team_state: getSelectedChipValues("stats", "team_state"),
    patient_care: getSelectedChipValues("stats", "patient_care"),
    case_exists: getSelectedChipValues("stats", "case_exists"),
    share: getSelectedChipValues("stats", "share"),
    q: $("#statsFreeSearch").value.trim(),
  };
}

function ratingColor(r) {
  return r === "良い" ? "var(--good)" : r === "普通" ? "var(--mid)" : r === "悪い" ? "var(--bad)" : "var(--line-strong)";
}
function ratingDot(r) {
  const c = ratingColor(r);
  return `<span class="inline-block w-2 h-2 rounded-full" style="background:${c}"></span>`;
}

function renderHistory() {
  const days = getActiveDays("#histFilter");
  const baseRecords = filterByDays(loadAll(), days);
  const filters = readHistFilters();
  const records = applyFilters(baseRecords, filters);
  const list = $("#histList");

  const activeFilterCount = Object.entries(filters).filter(([k,v]) => Array.isArray(v) ? v.length > 0 : (v && v !== "")).length;
  const filterNote = activeFilterCount
    ? `<div class="text-[11px] text-[var(--muted)] px-1 mb-1">${records.length}件表示（${baseRecords.length}件中 / ${activeFilterCount}項目で絞り込み中）</div>`
    : `<div class="text-[11px] text-[var(--muted)] px-1 mb-1">${records.length}件</div>`;

  if (!records.length) {
    list.innerHTML = `
      ${filterNote}
      <div class="card p-8 text-center">
        <div class="text-[13px] text-[var(--muted)]">該当する記録はありません</div>
      </div>`;
    return;
  }

  const caseTypeBadge = (t) => {
    const map = {
      "救急車": "background:#fee2e2;color:#991b1b",
      "ウォークイン": "background:#dbeafe;color:#1e40af",
      "その他": "background:#f3f4f6;color:#374151",
    };
    return `<span class="badge" style="${map[t] || map['その他']}">${t || "区分未設定"}</span>`;
  };

  list.innerHTML = filterNote + records.map(r => {
    const shiftBadge = r.shift === "夜勤"
      ? `<span class="badge badge-night">🌙 夜勤</span>`
      : `<span class="badge badge-day">☀ 日勤</span>`;
    const breakBad = r.workload.break_secured === "確保できなかった";
    const team = r.team_state;
    const pat = r.patient_care;
    const hasCase = r.case && r.case.exists === "あり";
    return `
      <div class="hist-card">
        <div class="flex items-start justify-between gap-3 mb-2">
          <div>
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              ${shiftBadge}
              ${breakBad ? `<span class="badge" style="background:#fef2f2;color:#b91c1c">休憩未確保</span>` : ""}
              ${hasCase ? `<span class="badge" style="background:#eef4fb;color:#1b3a6b">📋 症例あり</span>` : ""}
            </div>
            <div class="font-display font-bold text-[15px] text-[var(--navy-900)] num-tabular">${r.date}</div>
            <div class="text-[11px] text-[var(--muted)] num-tabular">保存 ${r.saved_time} ・ ${escapeHtml(r.reporter || "(記録者未入力)")}</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] text-[var(--muted)]">Ns / Dr</div>
            <div class="text-[14px] font-bold num-tabular text-[var(--navy-800)]">${r.team.nurses} / ${r.team.doctors}</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-x-3 gap-y-1.5 mt-3 pt-3 border-t border-[var(--line)]">
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(team.team_collab)} チーム連携 <span class="ml-auto font-semibold text-[var(--navy-800)]">${team.team_collab || "—"}</span></div>
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(team.external_collab)} 他機関連携 <span class="ml-auto font-semibold text-[var(--navy-800)]">${team.external_collab || "—"}</span></div>
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(team.psych_safety)} 心理的安全 <span class="ml-auto font-semibold text-[var(--navy-800)]">${team.psych_safety || "—"}</span></div>
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(pat.hospitality)} 接遇 <span class="ml-auto font-semibold text-[var(--navy-800)]">${pat.hospitality || "—"}</span></div>
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(pat.wait_care)} 待ち配慮 <span class="ml-auto font-semibold text-[var(--navy-800)]">${pat.wait_care || "—"}</span></div>
          <div class="text-[11px] flex items-center gap-1.5">${ratingDot(pat.anxiety_relief)} 不安軽減 <span class="ml-auto font-semibold text-[var(--navy-800)]">${pat.anxiety_relief || "—"}</span></div>
        </div>
        ${breakBad ? `
          <div class="mt-3 pt-3 border-t border-[var(--line)] text-[11px] text-[var(--muted)]">
            不足 <span class="font-bold text-[var(--bad)] num-tabular">${r.workload.short_min}分</span> ／ ${r.workload.short_people}名
            ${r.workload.help_requested ? ` ／ 応援要請: <span class="font-semibold text-[var(--navy-800)]">${r.workload.help_requested}</span>` : ""}
          </div>` : ""}
        ${pat.comment ? `<div class="mt-2 text-[11px] text-[var(--navy-700)] bg-[var(--soft-info)] p-2 rounded-md"><span class="font-semibold">患者家族コメント</span><br>${escapeHtml(pat.comment)}</div>` : ""}
        ${hasCase ? `
          <div class="mt-3 pt-3 border-t border-[var(--line)]">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-[11px] font-semibold text-[var(--navy-700)]">📋 振り返り症例</span>
              ${caseTypeBadge(r.case.type)}
              ${r.case.case_id ? `<span class="text-[11px] text-[var(--muted)]">ID: <span class="font-semibold text-[var(--navy-800)]">${escapeHtml(r.case.case_id)}</span></span>` : ""}
            </div>
            ${r.case.content ? `<div class="p-3 rounded-lg bg-[var(--soft-info)] text-[12px] text-[var(--navy-800)] leading-relaxed whitespace-pre-wrap">${escapeHtml(r.case.content)}</div>` : `<div class="text-[11px] text-[var(--muted)] italic">（内容の記載なし）</div>`}
          </div>` : ""}
        ${r.share ? `<div class="mt-2 text-[11px] text-[var(--navy-700)] bg-[var(--soft-info)] p-2 rounded-md"><span class="font-semibold">💬 共有事項</span><br>${escapeHtml(r.share)}</div>` : ""}
      </div>`;
  }).join("");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

// ------------ Stats ------------
function rateToNum(r) {
  return r === "良い" ? 3 : r === "普通" ? 2 : r === "悪い" ? 1 : null;
}
function avg(arr) {
  const v = arr.filter(x => x !== null && !isNaN(x));
  return v.length ? (v.reduce((a,b)=>a+b,0) / v.length) : null;
}

function renderStats() {
  const days = getActiveDays("#statsFilter");
  const filters = readStatsFilters();
  const baseRecords = filterByDays(loadAll(), days);
  const records = applyFilters(baseRecords, filters);
  const el = $("#statsContent");

  const activeFilterCount = Object.entries(filters).filter(([k,v]) => Array.isArray(v) ? v.length > 0 : (v && v !== "")).length;
  const filterNote = activeFilterCount
    ? `<div class="text-[11px] text-[var(--muted)] px-1 mb-3">対象: ${records.length}件（全${baseRecords.length}件中 / ${activeFilterCount}項目で絞り込み中）</div>`
    : `<div class="text-[11px] text-[var(--muted)] px-1 mb-3">対象: ${records.length}件</div>`;

  if (!records.length) {
    el.innerHTML = `
      ${filterNote}
      <div class="card p-8 text-center">
        <div class="text-[13px] text-[var(--muted)]">該当するデータはありません</div>
      </div>`;
    return;
  }

  const teamMetrics = [
    { key: "team_collab", label: "チーム連携", group: "team_state" },
    { key: "external_collab", label: "他機関連携", group: "team_state" },
    { key: "psych_safety", label: "心理的安全性", group: "team_state" },
  ];
  const patientMetrics = [
    { key: "hospitality", label: "接遇", group: "patient_care" },
    { key: "wait_care", label: "待ち時間への配慮", group: "patient_care" },
    { key: "anxiety_relief", label: "不安軽減", group: "patient_care" },
  ];
  const addAvg = m => ({
    ...m,
    avg: avg(records.map(r => rateToNum(r[m.group][m.key])))
  });
  const teamAvgs = teamMetrics.map(addAvg);
  const patientAvgs = patientMetrics.map(addAvg);

  // 休憩関連の集計
  const breakSecuredCount = records.filter(r => r.workload.break_secured === "確保できた").length;
  const breakMissCount = records.filter(r => r.workload.break_secured === "確保できなかった").length;
  const breakSecuredRate = records.length ? (breakSecuredCount / records.length) * 100 : 0;
  const breakMissRate = records.length ? (breakMissCount / records.length) * 100 : 0;
  const totalShortMin = records.reduce((s, r) => s + (r.workload.short_min || 0), 0);
  const totalShortPeople = records.reduce((s, r) => s + (r.workload.short_people || 0), 0);
  // 応援要請の内訳（未確保時のみ）
  const helpYesCount = records.filter(r => r.workload.break_secured === "確保できなかった" && r.workload.help_requested === "あり").length;
  const helpNoCount = records.filter(r => r.workload.break_secured === "確保できなかった" && r.workload.help_requested === "なし").length;

  const metricBlock = (title, icon, arr) => `
    <div class="card p-5 mb-4">
      <div class="flex items-center gap-2 mb-3">
        ${icon}
        <div class="text-[12px] font-semibold text-[var(--navy-700)]">${title}</div>
      </div>
      <div class="space-y-3">
        ${arr.map(m => {
          const v = m.avg;
          const pct = v ? (v/3)*100 : 0;
          const color = v >= 2.5 ? "var(--good)" : v >= 1.5 ? "var(--mid)" : v ? "var(--bad)" : "var(--line-strong)";
          return `
            <div>
              <div class="flex items-center justify-between mb-1">
                <span class="text-[12px] font-semibold text-[var(--navy-800)]">${m.label}</span>
                <span class="text-[13px] font-bold num-tabular" style="color:${color}">${v !== null ? v.toFixed(2) : "—"}</span>
              </div>
              <div class="score-bar">
                <div style="width:${pct}%; background:${color}"></div>
              </div>
            </div>`;
        }).join("")}
      </div>
    </div>`;

  const statsIcon = `<svg viewBox="0 0 24 24" width="14" height="14" class="ico text-[var(--navy-700)]"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>`;

  let html = "";

  // サマリー
  {
    html += `
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="stat-tile">
          <div class="stat-label">記録数</div>
          <div class="stat-value num-tabular">${records.length}<span class="stat-unit">件</span></div>
        </div>
        <div class="stat-tile">
          <div class="stat-label">休憩確保率</div>
          <div class="stat-value num-tabular" style="color: ${breakSecuredRate >= 75 ? 'var(--good)' : breakSecuredRate >= 50 ? 'var(--mid)' : 'var(--bad)'}">${breakSecuredRate.toFixed(0)}<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-tile">
          <div class="stat-label">休憩未確保</div>
          <div class="stat-value num-tabular" style="color: ${breakMissCount > 0 ? 'var(--bad)' : 'var(--muted)'}">${breakMissCount}<span class="stat-unit">件</span></div>
        </div>
      </div>`;
  }

  // 休憩や時間外 ― 未確保時の状況を可視化
  {
    const securedPct = breakSecuredRate;
    const missPct = breakMissRate;

    // 未確保時のみを抽出
    const missRecords = records.filter(r => r.workload.break_secured === "確保できなかった");
    const avgShortMin = missRecords.length ? (missRecords.reduce((s, r) => s + (r.workload.short_min || 0), 0) / missRecords.length) : 0;
    const avgShortPeople = missRecords.length ? (missRecords.reduce((s, r) => s + (r.workload.short_people || 0), 0) / missRecords.length) : 0;

    // 不足時間の分布
    const bucket10_30 = missRecords.filter(r => r.workload.short_min > 0 && r.workload.short_min <= 30).length;
    const bucket30_60 = missRecords.filter(r => r.workload.short_min > 30 && r.workload.short_min <= 60).length;
    const bucket60plus = missRecords.filter(r => r.workload.short_min > 60).length;
    const maxBucket = Math.max(bucket10_30, bucket30_60, bucket60plus, 1);

    // 未確保記録ピックアップ（直近5件）
    const recentMiss = [...missRecords].sort((a,b) => b.saved_at_ms - a.saved_at_ms).slice(0, 5);

    html += `
      <div class="card p-5 mb-4">
        <div class="flex items-center gap-2 mb-3">
          <svg viewBox="0 0 24 24" width="14" height="14" class="ico text-[var(--navy-700)]"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
          <div class="text-[12px] font-semibold text-[var(--navy-700)]">休憩や時間外</div>
        </div>

        <div class="mb-4">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[12px] font-semibold text-[var(--navy-800)]">休憩確保率</span>
            <span class="text-[14px] font-bold num-tabular" style="color:${securedPct >= 75 ? 'var(--good)' : securedPct >= 50 ? 'var(--mid)' : 'var(--bad)'}">${securedPct.toFixed(1)}%</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden bg-[var(--line)]">
            <div style="width:${securedPct}%; background: var(--good)"></div>
            <div style="width:${missPct}%; background: var(--bad)"></div>
          </div>
          <div class="flex justify-between text-[10px] text-[var(--muted)] mt-1.5">
            <span>● 確保 ${breakSecuredCount}件</span>
            <span>● 未確保 ${breakMissCount}件</span>
          </div>
        </div>

        ${breakMissCount > 0 ? `
          <div class="pt-3 border-t border-[var(--line)]">
            <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">未確保時の状況（${breakMissCount}件）</div>

            <div class="grid grid-cols-2 gap-2 mb-3">
              <div class="p-2.5 rounded-lg bg-[var(--soft-info)]">
                <div class="text-[10px] text-[var(--muted)]">1件あたり平均不足</div>
                <div class="text-[17px] font-bold num-tabular text-[var(--navy-800)]">${avgShortMin.toFixed(0)}<span class="text-[11px] text-[var(--muted)] ml-0.5">分</span></div>
              </div>
              <div class="p-2.5 rounded-lg bg-[var(--soft-info)]">
                <div class="text-[10px] text-[var(--muted)]">1件あたり平均人数</div>
                <div class="text-[17px] font-bold num-tabular text-[var(--navy-800)]">${avgShortPeople.toFixed(1)}<span class="text-[11px] text-[var(--muted)] ml-0.5">名</span></div>
              </div>
            </div>

            <div class="mb-3">
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">不足時間の分布</div>
              <div class="space-y-2">
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">10〜30分</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket10_30/maxBucket)*100}%; background: var(--mid)"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket10_30}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">30〜60分</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket30_60/maxBucket)*100}%; background:#ea580c"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket30_60}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-[var(--muted)] w-[68px] flex-shrink-0">60分〜</span>
                  <div class="flex-1 h-5 rounded-md bg-[var(--line)] overflow-hidden relative">
                    <div class="h-full" style="width:${(bucket60plus/maxBucket)*100}%; background: var(--bad)"></div>
                  </div>
                  <span class="text-[12px] font-bold num-tabular text-[var(--navy-800)] w-8 text-right">${bucket60plus}</span>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">応援要請</div>
              <div class="flex gap-2">
                <div class="flex-1 p-2.5 rounded-lg bg-[var(--soft-info)]">
                  <div class="text-[10px] text-[var(--muted)]">あり</div>
                  <div class="text-[16px] font-bold num-tabular text-[var(--navy-800)]">${helpYesCount}<span class="text-[11px] text-[var(--muted)] ml-0.5">件</span></div>
                </div>
                <div class="flex-1 p-2.5 rounded-lg" style="background:#fef2f2">
                  <div class="text-[10px] text-[var(--muted)]">なし</div>
                  <div class="text-[16px] font-bold num-tabular" style="color:var(--bad)">${helpNoCount}<span class="text-[11px] text-[var(--muted)] ml-0.5">件</span></div>
                </div>
              </div>
            </div>

            <div>
              <div class="text-[11px] font-semibold text-[var(--navy-700)] mb-2">未確保だった勤務（直近${recentMiss.length}件）</div>
              <div class="space-y-1.5">
                ${recentMiss.map(r => `
                  <div class="flex items-center gap-2 p-2 rounded-md bg-[#fff7ed]">
                    <span class="badge ${r.shift === '夜勤' ? 'badge-night' : 'badge-day'}" style="flex-shrink:0">${r.shift === '夜勤' ? '🌙 夜勤' : '☀ 日勤'}</span>
                    <span class="text-[11px] num-tabular text-[var(--navy-800)] font-semibold">${r.date}</span>
                    <span class="text-[11px] text-[var(--muted)] flex-shrink-0">${escapeHtml(r.reporter || '')}</span>
                    <span class="ml-auto text-[11px] num-tabular font-bold" style="color:var(--bad)">${r.workload.short_min}分／${r.workload.short_people}名</span>
                    ${r.workload.help_requested === 'なし' ? `<span class="badge" style="background:#fef2f2;color:#b91c1c;flex-shrink:0">応援なし</span>` : ''}
                  </div>
                `).join("")}
              </div>
              ${missRecords.some(r => r.workload.no_help_reason) ? `
                <div class="mt-2 p-2.5 rounded-lg border border-[var(--line)]">
                  <div class="text-[10px] font-semibold text-[var(--muted)] mb-1">応援を要請しなかった理由（記載あり）</div>
                  ${missRecords.filter(r => r.workload.no_help_reason).slice(0,3).map(r => `
                    <div class="text-[11px] text-[var(--navy-800)] leading-relaxed py-1 border-b border-[var(--line)] last:border-b-0">・${escapeHtml(r.workload.no_help_reason)} <span class="text-[10px] text-[var(--muted)] ml-1 num-tabular">${r.date}</span></div>
                  `).join("")}
                </div>` : ""}
            </div>
          </div>` : `
          <div class="pt-3 border-t border-[var(--line)] text-center text-[12px] text-[var(--muted)]">
            ✓ この期間に休憩未確保の記録はありません
          </div>`}
      </div>`;
  }

  // チームの状態
  html += metricBlock("チームの状態", statsIcon, teamAvgs);

  // 患者家族
  html += metricBlock("患者家族への関わり", statsIcon, patientAvgs);

  el.innerHTML = filterNote + html;
}

// ------------ Export / PIN ------------
function setupExport() {
  $("#exportBtn").addEventListener("click", () => {
    $("#pinInput").value = "";
    $("#pinError").classList.add("hidden");
    updatePinDots("");
    openModal("pinModal");
    setTimeout(() => $("#pinInput").focus(), 100);
  });
  $("#pinInput").addEventListener("input", (e) => {
    const v = e.target.value.replace(/\D/g, "").slice(0,4);
    e.target.value = v;
    updatePinDots(v);
    $("#pinError").classList.add("hidden");
  });
  $("#pinConfirmBtn").addEventListener("click", () => {
    const v = $("#pinInput").value;
    if (v === PIN_CODE) {
      closeModal("pinModal");
      doExport();
    } else {
      $("#pinError").classList.remove("hidden");
    }
  });
}
function updatePinDots(v) {
  $$("#pinDots .pin-dot").forEach((d, i) => {
    d.dataset.filled = v.length > i ? "true" : "false";
    d.textContent = v[i] ? "●" : "";
  });
}

function doExport() {
  const records = loadAll();
  if (!records.length) {
    toast("エクスポートするデータがありません");
    return;
  }
  const headers = [
    "id","日付","保存時刻","勤務帯","記録者","看護師数","医師数",
    "休憩確保","不足時間(分)","対象人数","応援要請","応援なし理由",
    "チーム連携","チーム連携_場面","他機関連携","他機関連携_場面","心理的安全性","心理的安全性_場面",
    "接遇","待ち時間配慮","不安軽減","患者家族コメント",
    "ケース有無","搬送区分","ケースID","ケース内容","共有事項"
  ];
  const rows = records.map(r => [
    r.id, r.date, r.saved_time, r.shift || "", r.reporter || "",
    r.team.nurses, r.team.doctors,
    r.workload.break_secured || "", r.workload.short_min || 0, r.workload.short_people || 0,
    r.workload.help_requested || "", r.workload.no_help_reason || "",
    r.team_state.team_collab || "", r.team_state.team_collab_note || "",
    r.team_state.external_collab || "", r.team_state.external_collab_note || "",
    r.team_state.psych_safety || "", r.team_state.psych_safety_note || "",
    r.patient_care.hospitality || "", r.patient_care.wait_care || "", r.patient_care.anxiety_relief || "", r.patient_care.comment || "",
    r.case.exists || "", r.case.type || "", r.case.case_id || "", r.case.content || "",
    r.share || ""
  ]);
  const csv = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell ?? "");
      return /[",\n\r]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(",")
  ).join("\r\n");

  // BOM for Excel JP
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const z = n => String(n).padStart(2,"0");
  a.href = url;
  a.download = `ER_reflection_${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("CSVをダウンロードしました");
}

// ------------ Go ------------
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
